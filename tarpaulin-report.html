<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

    <script>
        var data = {"files":[{"path":["/","Users","mettamazza","Desktop","HIVE","src","engine","mod.rs"],"content":"#![allow(clippy::redundant_field_names, clippy::collapsible_if)]\nuse std::collections::HashMap;\nuse std::sync::Arc;\nuse tokio::sync::mpsc;\n\nuse crate::models::message::{Event, Response};\nuse crate::models::capabilities::AgentCapabilities;\nuse crate::models::scope::Scope;\n\nuse crate::memory::MemoryStore;\nuse crate::platforms::Platform;\nuse crate::providers::Provider;\nuse crate::teacher::Teacher;\n\n/// Format elapsed seconds as a human-readable string.\nfn format_elapsed(elapsed_secs: u64) -\u003e String {\n    if elapsed_secs \u003c 60 {\n        format!(\"{}s\", elapsed_secs)\n    } else {\n        format!(\"{:.1}m\", elapsed_secs as f64 / 60.0)\n    }\n}\n\nuse crate::swarm::SwarmManager;\n\n\npub struct EngineBuilder {\n    platforms: HashMap\u003cString, Box\u003cdyn Platform\u003e\u003e,\n    provider: Option\u003cArc\u003cdyn Provider\u003e\u003e,\n    capabilities: AgentCapabilities,\n    memory: MemoryStore,\n    swarm: Option\u003cArc\u003cSwarmManager\u003e\u003e,\n}\n\nimpl EngineBuilder {\n    pub fn new() -\u003e Self {\n        Self {\n            platforms: HashMap::new(),\n            provider: None,\n            capabilities: AgentCapabilities::default(),\n            memory: MemoryStore::new(None),\n            swarm: None,\n        }\n    }\n\n    pub fn with_platform(mut self, platform: Box\u003cdyn Platform\u003e) -\u003e Self {\n        self.platforms.insert(platform.name().to_string(), platform);\n        self\n    }\n\n    pub fn with_capabilities(mut self, capabilities: AgentCapabilities) -\u003e Self {\n        self.capabilities = capabilities;\n        self\n    }\n\n    pub fn with_provider(mut self, provider: Arc\u003cdyn Provider\u003e) -\u003e Self {\n        self.provider = Some(provider);\n        self\n    }\n\n    /// Injects a custom testing MemoryStore instead of the default global `memory/` path\n    #[cfg(test)]\n    pub fn with_memory(mut self, mem: MemoryStore) -\u003e Self {\n        self.memory = mem;\n        self\n    }\n    \n    /// Injects a pre-configured SwarmManager (e.g., dynamically built native drones)\n    pub fn with_swarm(mut self, swarm: Arc\u003cSwarmManager\u003e) -\u003e Self {\n        self.swarm = Some(swarm);\n        self\n    }\n    \n    pub fn build(self) -\u003e Result\u003cEngine, \u0026'static str\u003e {\n        let provider = self.provider.ok_or(\"Engine requires a Provider to be set\")?;\n        let (tx, rx) = mpsc::channel(100);\n        \n        let memory = Arc::new(self.memory);\n        \n        let swarm = match self.swarm {\n            Some(s) =\u003e s,\n            None =\u003e Arc::new(SwarmManager::new(provider.clone(), memory.clone())),\n        };\n\n        Ok(Engine {\n            platforms: Arc::new(self.platforms),\n            provider: provider.clone(),\n            capabilities: Arc::new(self.capabilities),\n            memory: memory,\n            swarm: swarm,\n            teacher: Arc::new(Teacher::new(None)),\n            event_sender: Some(tx),\n            event_receiver: rx,\n        })\n    }\n}\n\npub struct Engine {\n    platforms: Arc\u003cHashMap\u003cString, Box\u003cdyn Platform\u003e\u003e\u003e,\n    provider: Arc\u003cdyn Provider\u003e,\n    capabilities: Arc\u003cAgentCapabilities\u003e,\n    memory: Arc\u003cMemoryStore\u003e,\n    swarm: Arc\u003cSwarmManager\u003e,\n    teacher: Arc\u003cTeacher\u003e,\n    \n    // Channel for platforms to send events IN to the engine\n    event_sender: Option\u003cmpsc::Sender\u003cEvent\u003e\u003e,\n    // The engine receives them here\n    event_receiver: mpsc::Receiver\u003cEvent\u003e,\n}\n\nimpl Engine {\n    #[cfg(not(tarpaulin_include))]\n    pub async fn run(mut self) {\n        println!(\"Starting HIVE Engine...\");\n        \n        // Load persisted cross-session memory \n        self.memory.init().await;\n        \n        let sender = self.event_sender.take().expect(\"Engine event sender missing\");\n\n        // Start all platforms\n        for (name, platform) in self.platforms.iter() {\n            println!(\"Initializing platform: {}\", name);\n            if let Err(e) = platform.start(sender.clone()).await {\n                eprintln!(\"Failed to start platform {}: {}\", name, e);\n            }\n        }\n        \n        drop(sender);\n\n        println!(\"HIVE is active. Apis is listening.\");\n\n        // Main Event Loop\n        while let Some(event) = self.event_receiver.recv().await {\n            \n            // 0. Intercept System Commands (/clean or /clear)\n            if event.content.trim() == \"/clean\" || event.content.trim() == \"/clear\" {\n                if self.capabilities.admin_users.contains(\u0026event.author_id) {\n                    println!(\"[ADMIN COMMAND] Executing Factory Memory Wipe initiated by UID: {}\", event.author_id);\n                    self.memory.wipe_all().await;\n                    \n                    let response = Response {\n                        platform: event.platform.clone(),\n                        target_scope: event.scope.clone(),\n                        text: \"🧠 **Factory Reset Complete.** All persistent memory structures and timelines have been securely destroyed. I am completely awake with no prior context.\".to_string(),\n                        is_telemetry: false,\n                    };\n                    if let Some(platform) = self.platforms.get(response.platform.split(':').next().unwrap_or(\"\")) {\n                        let _ = platform.send(response).await;\n                    }\n                    // Hard exit to prevent the platform from echoing this completion message back into a fresh timeline.\n                    println!(\"Memory wipe complete. HIVE Engine shutting down.\");\n                    std::process::exit(0);\n                } else {\n                    println!(\"[SECURITY INCIDENT] Unauthorized wipe attempt by UID: {}\", event.author_id);\n                    let response = Response {\n                        platform: event.platform.clone(),\n                        target_scope: event.scope.clone(),\n                        text: \"🚫 **Permission Denied.** Only configured HIVE Administrators can perform a memory factory reset.\".to_string(),\n                        is_telemetry: false,\n                    };\n                    if let Some(platform) = self.platforms.get(response.platform.split(':').next().unwrap_or(\"\")) {\n                        let _ = platform.send(response).await;\n                    }\n                    // Skip the rest of the LLM generation loop\n                    continue;\n                }\n            }\n\n            if event.content.trim() == \"/teaching_mode\" {\n                if self.capabilities.admin_users.contains(\u0026event.author_id) {\n                    let current = self.teacher.auto_train_enabled.load(std::sync::atomic::Ordering::Relaxed);\n                    self.teacher.auto_train_enabled.store(!current, std::sync::atomic::Ordering::Relaxed);\n                    let state_str = if !current { \"enabled\" } else { \"disabled\" };\n                    let response = Response {\n                        platform: event.platform.clone(),\n                        target_scope: event.scope.clone(),\n                        text: format!(\"🎓 **Teaching Mode Toggle:** Background MLX Auto-Training is now **{}.**\\n*(Golden examples and Preference Pairs are always collected regardless of this setting).*\", state_str),\n                        is_telemetry: false,\n                    };\n                    if let Some(platform) = self.platforms.get(response.platform.split(':').next().unwrap_or(\"\")) {\n                        let _ = platform.send(response).await;\n                    }\n                } else {\n                    let response = Response {\n                        platform: event.platform.clone(),\n                        target_scope: event.scope.clone(),\n                        text: \"🚫 **Permission Denied.** Only configured HIVE Administrators can toggle teaching mode.\".to_string(),\n                        is_telemetry: false,\n                    };\n                    if let Some(platform) = self.platforms.get(response.platform.split(':').next().unwrap_or(\"\")) {\n                        let _ = platform.send(response).await;\n                    }\n                }\n                continue;\n            }\n\n            // 1. Retrieve working history for this specific scope\n            let mut history = self.memory.get_working_history(\u0026event.scope).await;\n\n            // 2. Now store the incoming event in memory for future context\n            self.memory.add_event(event.clone()).await;\n\n            // 3. Check for Context Limit \u0026 Trigger Autosave\n            if let Some(continuity_summary) = self.memory.check_and_trigger_autosave(\u0026event.scope).await {\n                // If an autosave happened, the history we retrieved in step 1 is stale and huge.\n                // We must reset our history to JUST the continuity summary and the new event.\n                history = vec![continuity_summary, event.clone()];\n            }\n\n            // 3. Setup Telemetry Channel for Live Updates (ErnOS CognitionTracker pattern)\n            let (telemetry_tx, mut telemetry_rx) = mpsc::channel::\u003cString\u003e(50);\n            \n            let platforms_ref = self.platforms.clone();\n            let platform_id_clone = event.platform.clone();\n            let scope_clone = event.scope.clone();\n            \n            // Spawn debounced telemetry task (800ms interval, matching ErnOS)\n            tokio::spawn(async move {\n                let start_time = tokio::time::Instant::now();\n                let debounce_ms = 800;\n                let mut has_update = false;\n                let mut buffered_thought = String::new();\n\n                loop {\n                    let recv_result = tokio::time::timeout(\n                        tokio::time::Duration::from_millis(debounce_ms),\n                        telemetry_rx.recv()\n                    ).await;\n\n                    match recv_result {\n                        Ok(Some(chunk)) =\u003e {\n                            // Accumulate actual thinking tokens\n                            buffered_thought.push_str(\u0026chunk);\n                            has_update = true;\n                        }\n                        Ok(None) =\u003e {\n                            // Channel closed — provider finished\n                            break;\n                        }\n                        Err(_) =\u003e {\n                            // Debounce timeout — flush update with accumulated thinking text\n                            if has_update {\n                                let elapsed_str = format_elapsed(start_time.elapsed().as_secs());\n                                let status = format!(\"🧠 Thinking... ({})\\n\\n{}\", elapsed_str, buffered_thought);\n                                let update_res = Response {\n                                    platform: platform_id_clone.clone(),\n                                    target_scope: scope_clone.clone(),\n                                    text: status,\n                                    is_telemetry: true,\n                                };\n                                if let Some(platform) = platforms_ref.get(update_res.platform.split(':').next().unwrap_or(\"\")) {\n                                    let _ = platform.send(update_res).await;\n                                }\n                                has_update = false;\n                            }\n                        }\n                    }\n                }\n\n                // Channel closed: send final \"complete\" telemetry with full reasoning\n                let elapsed_str = format_elapsed(start_time.elapsed().as_secs());\n                let status = if buffered_thought.is_empty() {\n                    format!(\"✅ Complete ({})\", elapsed_str)\n                } else {\n                    format!(\"✅ Complete ({})\\n\\n{}\", elapsed_str, buffered_thought)\n                };\n                let update_res = Response {\n                    platform: platform_id_clone.clone(),\n                    target_scope: scope_clone.clone(),\n                    text: status,\n                    is_telemetry: true,\n                };\n                if let Some(platform) = platforms_ref.get(update_res.platform.split(':').next().unwrap_or(\"\")) {\n                    let _ = platform.send(update_res).await;\n                }\n            });\n\n            // 4. Multi-Turn Agentic Action Loop\n            let drone_list = self.swarm.get_available_drones_text();\n            let mut base_system_prompt = crate::prompts::SystemPromptBuilder::assemble(\u0026event.scope, self.memory.clone()).await;\n            base_system_prompt.push_str(\"\\n\\n\");\n            base_system_prompt.push_str(\u0026crate::swarm::planner::REACT_AGENT_PROMPT.replace(\"{available_drones}\", \u0026drone_list));\n            \n            let mut context_from_swarm = String::new();\n            let mut final_response_text = String::new();\n            let max_agent_turns = 15;\n            let mut current_turn = 0;\n            let mut observer_attempts = 0;\n            let mut all_rejections: Vec\u003c(String, String, String)\u003e = vec![];\n\n            // The inner ReAct loop\n            while current_turn \u003c max_agent_turns {\n                current_turn += 1;\n                \n                context_from_swarm.push_str(\u0026format!(\"\\n\\n=== START OF TURN {} ===\\n\", current_turn));\n                \n                let _active_prompt = format!(\"{}{}\", base_system_prompt, context_from_swarm);\n                \n                // Call LLM for this turn\n                let candidate_text = match self.provider.generate(\u0026base_system_prompt, \u0026history, \u0026event, \u0026context_from_swarm, if current_turn == 1 { Some(telemetry_tx.clone()) } else { None }).await {\n                    Ok(text) =\u003e text,\n                    Err(e) =\u003e {\n                        eprintln!(\"[AGENT LOOP] Provider Error: {:?}\", e);\n                        format!(\"*System Error:* Something went wrong connecting to the provider. ({})\", e)\n                    }\n                };\n\n                // Fast path for hard errors\n                if candidate_text.starts_with(\"*System Error:*\") {\n                    final_response_text = candidate_text;\n                    break;\n                }\n\n                // Try to parse the LLM's output as a JSON tool command\n                let cleaned_json = Self::repair_planner_json(\u0026candidate_text);\n                \n                let plan = match serde_json::from_str::\u003ccrate::swarm::planner::SwarmPlan\u003e(\u0026cleaned_json) {\n                    Ok(p) =\u003e p,\n                    Err(_) =\u003e {\n                        if context_from_swarm.is_empty() {\n                            context_from_swarm.push_str(\"\\n\\n[YOUR TOOLS HAVE EXECUTED — USE THESE RESULTS FOR YOUR NEXT TURN]\\n\");\n                        }\n                        context_from_swarm.push_str(\u0026format!(\"Turn {} - Error: [SYSTEM COMPILER ERROR: INVISIBLE TO USER] YOUR LAST RESPONSE WAS NOT VALID JSON. YOU ARE TRAPPED IN A LOOP. YOU MUST OUTPUT EXACTLY ONE JSON BLOCK. To reply to the user, you MUST construct a JSON block containing the `reply_to_request` tool.\\n\\n\", current_turn));\n                        println!(\"[AGENT LOOP] 🔄 Turn {} output was not JSON. Enforcing JSON...\", current_turn);\n                        continue;\n                    }\n                };\n                \n                if context_from_swarm.is_empty() {\n                    context_from_swarm.push_str(\"\\n\\n[YOUR TOOLS HAVE EXECUTED — USE THESE RESULTS FOR YOUR NEXT TURN]\\n\");\n                }\n                \n                if let Some(thought) = \u0026plan.thought {\n                    context_from_swarm.push_str(\u0026format!(\"Turn {} Thought: {}\\n\", current_turn, thought));\n                }\n                \n                let mut reply_task = None;\n                let mut standard_tasks = vec![];\n                let no_tools = plan.tasks.is_empty();\n                \n                for t in plan.tasks {\n                    if t.drone_type == \"reply_to_request\" {\n                        reply_task = Some(t);\n                    } else {\n                        standard_tasks.push(t);\n                    }\n                }\n                \n                if no_tools {\n                    println!(\"[AGENT LOOP] ⚠️ Turn {} produced no valid tools. Injecting error to prompt...\", current_turn);\n                    context_from_swarm.push_str(\u0026format!(\"Turn {} - Error: [SYSTEM COMPILER ERROR: INVISIBLE TO USER] YOUR LAST RESPONSE CONTAINED NO VALID TOOLS. YOU ARE TRAPPED IN A LOOP. YOU CANNOT TALK TO THE USER DIRECTLY. To reply to the user, you MUST construct a JSON block containing the `reply_to_request` tool.\\n\\n\", current_turn));\n                    continue;\n                }\n                \n                if !standard_tasks.is_empty() {\n                    let standard_plan = crate::swarm::planner::SwarmPlan {\n                        thought: plan.thought.clone(),\n                        tasks: standard_tasks,\n                    };\n                    let tx_clone = telemetry_tx.clone();\n                    let drone_results = self.swarm.execute_plan(standard_plan, \u0026event.content, Some(tx_clone)).await;\n                    \n                    let result_count = drone_results.len();\n                    for res in \u0026drone_results {\n                        context_from_swarm.push_str(\u0026format!(\"Turn {} - Task {}: {:?}\\nOutput: {}\\n\\n\", current_turn, res.task_id, res.status, res.output));\n                    }\n                    println!(\"[AGENT LOOP] 🔄 Turn {} executed {} tools. Looping...\", current_turn, result_count);\n                }\n                \n                if let Some(reply) = reply_task {\n                    observer_attempts += 1;\n                    let candidate_answer = reply.description;\n\n                    let audit_result = crate::prompts::observer::run_skeptic_audit(\n                        self.provider.clone(),\n                        \u0026self.capabilities,\n                        \u0026candidate_answer,\n                        \u0026base_system_prompt,\n                        \u0026history,\n                        \u0026event,\n                        \u0026context_from_swarm\n                    ).await;\n\n                    if audit_result.is_allowed() {\n                        // Teacher capture: only Public scope\n                        if matches!(event.scope, Scope::Public { .. }) {\n                            if observer_attempts == 1 {\n                                // 🏆 GOLDEN: Perfect first-pass Final Answer\n                                self.teacher.capture_golden(\n                                    \u0026base_system_prompt, \u0026event, \u0026context_from_swarm, \u0026candidate_answer\n                                ).await;\n                            } else {\n                                // ⚖️ ORPO: Every rejection becomes a preference pair\n                                for (idx, (rejected, category, reason)) in all_rejections.iter().enumerate() {\n                                    self.teacher.capture_preference_pair(\n                                        \u0026base_system_prompt, \u0026event, \u0026context_from_swarm,\n                                        rejected, \u0026candidate_answer,\n                                        category, reason,\n                                        idx + 1, observer_attempts,\n                                    ).await;\n                                }\n                            }\n                        }\n                        println!(\"[AGENT LOOP] ✅ Final answer approved by Observer on turn {}.\", current_turn);\n                        final_response_text = candidate_answer;\n                        break;\n                    } else {\n                        // Store ALL rejections for multi-signal training\n                        all_rejections.push((\n                            candidate_answer.clone(),\n                            audit_result.failure_category.clone(),\n                            audit_result.what_went_wrong.clone(),\n                        ));\n                        println!(\"[OBSERVER BLOCKED]\\nCategory: {}\\nWhat Worked: {}\\nWhat Went Wrong: {}\\nHow to Fix: {}\", audit_result.failure_category, audit_result.what_worked, audit_result.what_went_wrong, audit_result.how_to_fix);\n                        \n                        let guidance = format!(\"[INTERNAL AUDIT: INVISIBLE TO USER] CORRECTION REQUIRED FOR YOUR REPLY\\nFAILURE CATEGORY: {}\\nWHAT WORKED: {}\\nWHAT WENT WRONG: {}\\nHOW TO FIX: {}\\n\\n\", audit_result.failure_category, audit_result.what_worked, audit_result.what_went_wrong, audit_result.how_to_fix);\n                        context_from_swarm.push_str(\u0026guidance);\n                        \n                        // Broadcast the Observer block to the frontend\n                        let msg = format!(\"\\n🛑 **[OBSERVER BLOCKED GENERATION]**\\n**Category:** {}\\n**Violation:** {}\\n**Fixing...**\", audit_result.failure_category, audit_result.what_went_wrong);\n                        let _ = telemetry_tx.send(msg).await;\n                        continue;\n                    }\n                }\n                \n                // If we get here, no reply_to_request and loops continues naturally \n                continue;\n            }\n\n            if final_response_text.is_empty() {\n                final_response_text = \"[System Error] Agent loop exhausted max turns (15) without producing a final valid answer.\".to_string();\n            }\n\n            let response_text = final_response_text;\n\n            let response = Response {\n                platform: event.platform.clone(),\n                target_scope: event.scope.clone(),\n                text: response_text.clone(),\n                is_telemetry: false,\n            };\n\n            // 6. Store Apis's response in memory so it remembers what it said\n            let apis_event = Event {\n                platform: response.platform.clone(),\n                scope: response.target_scope.clone(),\n                author_name: \"Apis\".to_string(),\n                author_id: \"test\".into(),\n                content: response.text.clone(),\n            };\n            self.memory.add_event(apis_event).await;\n\n            // 7. Route final response back to the platform it came from\n            if let Some(platform) = self.platforms.get(response.platform.split(':').next().unwrap_or(\"\")) {\n                if let Err(e) = platform.send(response).await {\n                    eprintln!(\"Error sending response to {}: {}\", platform.name(), e);\n                }\n            } else {\n                eprintln!(\"Received event from unknown platform: {}\", response.platform);\n            }\n\n            // 8. Background Self-Supervised Training Trigger\n            let (golden_count, pair_count) = self.teacher.get_counts();\n            if golden_count \u003e= crate::teacher::GOLDEN_THRESHOLD || pair_count \u003e= crate::teacher::PAIR_THRESHOLD {\n                if self.teacher.auto_train_enabled.load(std::sync::atomic::Ordering::Relaxed) {\n                    let teacher_clone = self.teacher.clone();\n                    let tx_clone = telemetry_tx.clone();\n                    \n                    // Spawn the training process in a detached background task\n                    tokio::spawn(async move {\n                        if teacher_clone.try_acquire_training_lock().await {\n                            let _ = tx_clone.send(format!(\"\\n⚙️ **[TEACHER MODULE]** Threshold reached (Golden: {}, Pairs: {}). Background MLX LoRA training initiated...\", golden_count, pair_count)).await;\n                            println!(\"[TEACHER] Threshold reached. Spawning Python MLX training pipeline...\");\n                            \n                            // Reset counters immediately so we don't trigger again while training\n                            teacher_clone.reset_counts();\n\n                            // Execute python3 training/train_teacher.py\n                            let output = std::process::Command::new(\"python3\")\n                                .arg(\"training/train_teacher.py\")\n                                .output();\n\n                            match output {\n                                Ok(res) =\u003e {\n                                    let stdout = String::from_utf8_lossy(\u0026res.stdout);\n                                    let stderr = String::from_utf8_lossy(\u0026res.stderr);\n                                    if res.status.success() {\n                                        println!(\"[TEACHER] ✅ Training complete:\\n{}\", stdout);\n                                        let _ = tx_clone.send(\"\\n✅ **[TEACHER MODULE]** Training complete. New weights registered and ready.\".to_string()).await;\n                                    } else {\n                                        eprintln!(\"[TEACHER] ❌ Training failed:\\nSTDOUT:\\n{}\\nSTDERR:\\n{}\", stdout, stderr);\n                                        let _ = tx_clone.send(\"\\n❌ **[TEACHER MODULE]** Training script failed. Check HIVE console logs.\".to_string()).await;\n                                    }\n                                }\n                                Err(e) =\u003e {\n                                    eprintln!(\"[TEACHER] ❌ Failed to execute Python training script: {}\", e);\n                                    let _ = tx_clone.send(\"\\n❌ **[TEACHER MODULE]** Failed to execute Python script. Is python3 installed?\".to_string()).await;\n                                }\n                            }\n\n                            teacher_clone.release_training_lock().await;\n                        }\n                    });\n                } else {\n                    println!(\"[TEACHER] Training threshold reached (Golden: {}, Pairs: {}), but auto-tuning is toggled off.\", golden_count, pair_count);\n                }\n            }\n        }\n    }\n\n    /// Repair common LLM JSON malformations from the Planner output.\n    /// Strips markdown fences, BOM, trailing commas, and extracts JSON from conversational preamble.\n    fn repair_planner_json(raw: \u0026str) -\u003e String {\n        let mut s = raw.trim().to_string();\n\n        // Strip BOM\n        s = s.trim_start_matches('\\u{feff}').to_string();\n\n        // Check if there is a json code block within conversational text\n        let json_start_marker = \"```json\";\n        let generic_start_marker = \"```\";\n\n        if let Some(start_idx) = s.find(json_start_marker) {\n            // Found a ```json block, extract everything after the marker\n            s = s[start_idx + json_start_marker.len()..].to_string();\n            // Find the closing fence\n            if let Some(end_idx) = s.rfind(\"```\") {\n                s = s[..end_idx].to_string();\n            }\n        } else if let Some(start_idx) = s.find(generic_start_marker) {\n             // Found a generic ``` block\n            s = s[start_idx + generic_start_marker.len()..].to_string();\n            if let Some(end_idx) = s.rfind(\"```\") {\n                 s = s[..end_idx].to_string();\n            }\n        }\n\n        s = s.trim().to_string();\n\n        // If the LLM wrote conversational text before the JSON, extract just the JSON\n        if let Some(start) = s.find('{') {\n            if let Some(end) = s.rfind('}') {\n                if end \u003e start {\n                    s = s[start..=end].to_string();\n                }\n            }\n        } else {\n            // No JSON at all — Planner output pure conversation. Return empty plan.\n            return r#\"{\"tasks\": []}\"#.to_string();\n        }\n\n        // Fix trailing commas before closing braces/brackets: ,} or ,]\n        // This is the most common LLM JSON mistake\n        // Simple approach without regex dependency: repeatedly replace ,} and ,]\n        while s.contains(\",}\") {\n            s = s.replace(\",}\", \"}\");\n        }\n        while s.contains(\",]\") {\n            s = s.replace(\",]\", \"]\");\n        }\n        // Also handle whitespace between comma and closing: , } or , ]\n        while s.contains(\", }\") {\n            s = s.replace(\", }\", \"}\");\n        }\n        while s.contains(\", ]\") {\n            s = s.replace(\", ]\", \"]\");\n        }\n\n        s.trim().to_string()\n    }\n}\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[tokio::test]\n    async fn test_engine_trigger_autosave() {\n        let mut mock_provider = MockProvider::new();\n        mock_provider\n            .expect_generate()\n            .returning(|_, _, _, _, _| Ok(\"Success\".to_string()));\n\n        let engine = EngineBuilder::new()\n            .with_platform(Box::new(DummyPlatform))\n            .with_provider(Arc::new(mock_provider))\n            .with_capabilities(AgentCapabilities::default())\n            .build()\n            .unwrap();\n\n        let giant_content = \"A\".repeat(1_025_000);\n        let event = Event {\n            platform: \"test\".to_string(),\n            scope: Scope::Public { channel_id: \"test\".into(), user_id: \"test\".into() },\n            author_name: \"Tester\".to_string(),\n            author_id: \"test\".into(),\n            content: giant_content,\n        };\n\n        let tx = engine.event_sender.as_ref().unwrap().clone();\n        \n        tokio::spawn(async move {\n            engine.run().await;\n        });\n\n        tx.send(event).await.unwrap();\n        tokio::time::sleep(tokio::time::Duration::from_millis(500)).await;\n    }\n    use crate::providers::MockProvider;\n    use crate::models::scope::Scope;\n    use tokio::sync::mpsc;\n    use tokio::time::{sleep, Duration};\n\n    pub(crate) struct DummyPlatform;\n\n    #[async_trait::async_trait]\n    impl Platform for DummyPlatform {\n        fn name(\u0026self) -\u003e \u0026str { \"dummy\" }\n        async fn start(\u0026self, _: mpsc::Sender\u003cEvent\u003e) -\u003e Result\u003c(), crate::platforms::PlatformError\u003e { Ok(()) }\n        async fn send(\u0026self, _: Response) -\u003e Result\u003c(), crate::platforms::PlatformError\u003e { Ok(()) }\n    }\n\n    #[tokio::test]\n    async fn test_engine_routing_with_mock_provider() {\n        // Setup the mock provider\n        let mut mock_provider = MockProvider::new();\n        mock_provider\n            .expect_generate()\n            .returning(|_sys, _hist, req, _ctx, _tx| {\n                Ok(format!(\"Mock response to: {}\", req.content))\n            });\n\n        // Initialize engine\n        let engine = EngineBuilder::new()\n            .with_platform(Box::new(DummyPlatform))\n            .with_provider(Arc::new(mock_provider))\n            .build()\n            .expect(\"Build failed\");\n\n        let sender = engine.event_sender.as_ref().unwrap().clone();\n        \n        // Spawn engine in background\n        tokio::spawn(async move {\n            engine.run().await;\n        });\n\n        // Send a test event\n        let test_event = Event {\n            platform: \"dummy\".to_string(),\n            scope: Scope::Public { channel_id: \"test\".into(), user_id: \"test\".into() },\n            author_name: \"TestUser\".to_string(),\n            author_id: \"test\".into(),\n            content: \"Ping!\".to_string(),\n        };\n\n        sender.send(test_event).await.unwrap();\n\n        // Give it a tiny bit of time to process\n        sleep(Duration::from_millis(50)).await;\n        // The coverage run will pick up these lines being hit.\n        // And mockall enforces our expectations automatically.\n    }\n\n    #[tokio::test]\n    async fn test_engine_handles_provider_error() {\n        use crate::providers::MockProvider;\n        use crate::engine::tests::DummyPlatform;\n        use tokio::time::{sleep, Duration};\n        \n        let mut mock_provider = MockProvider::new();\n        mock_provider\n            .expect_generate()\n            .returning(|_, _, _, _, _| Err(crate::providers::ProviderError::ConnectionError(\"Boom\".to_string())));\n\n        let engine = EngineBuilder::new()\n            .with_platform(Box::new(DummyPlatform))\n            .with_provider(Arc::new(mock_provider))\n            .build()\n            .expect(\"Build failed\");\n\n        let sender = engine.event_sender.as_ref().unwrap().clone();\n        \n        tokio::spawn(async move {\n            engine.run().await;\n        });\n\n        sender.send(Event {\n            platform: \"dummy\".to_string(),\n            scope: Scope::Public { channel_id: \"test\".into(), user_id: \"test\".into() },\n            author_name: \"TestUser\".to_string(),\n            author_id: \"test\".into(),\n            content: \"Ping!\".to_string(),\n        }).await.unwrap();\n\n        sleep(Duration::from_millis(50)).await;\n    }\n\n    #[tokio::test]\n    async fn test_engine_platform_start_and_send_failure() {\n        use crate::providers::MockProvider;\n        use tokio::time::{sleep, Duration};\n        \n        pub(crate) struct FailingPlatform;\n        #[async_trait::async_trait]\n        impl Platform for FailingPlatform {\n            fn name(\u0026self) -\u003e \u0026str { \"failing\" }\n            async fn start(\u0026self, _: mpsc::Sender\u003cEvent\u003e) -\u003e Result\u003c(), crate::platforms::PlatformError\u003e { \n                Err(crate::platforms::PlatformError::Other(\"start fail\".into()))\n            }\n            async fn send(\u0026self, _: Response) -\u003e Result\u003c(), crate::platforms::PlatformError\u003e { \n                Err(crate::platforms::PlatformError::Other(\"send fail\".into()))\n            }\n        }\n\n        let mut mock_provider = MockProvider::new();\n        mock_provider.expect_generate().returning(|_, _, _, _, _| Ok(\"reply\".to_string()));\n\n        let engine = EngineBuilder::new()\n            .with_platform(Box::new(FailingPlatform))\n            .with_provider(Arc::new(mock_provider))\n            .build().unwrap();\n\n        let sender = engine.event_sender.as_ref().unwrap().clone();\n        tokio::spawn(async move {\n            engine.run().await; // hits start error covering line 68\n        });\n\n        sender.send(Event {\n            platform: \"failing\".to_string(),\n            scope: Scope::Public { channel_id: \"test\".into(), user_id: \"test\".into() },\n            author_name: \"Test\".to_string(),\n            author_id: \"test\".into(),\n            content: \"Ping\".to_string(),\n        }).await.unwrap();\n        sleep(Duration::from_millis(50)).await; // hits send error covering line 111\n    }\n\n    #[tokio::test]\n    async fn test_engine_unknown_platform() {\n        use crate::providers::MockProvider;\n        use crate::engine::tests::DummyPlatform;\n        use tokio::time::{sleep, Duration};\n        \n        let mut mock_provider = MockProvider::new();\n        mock_provider.expect_generate().returning(|_, _, _, _, _| Ok(\"reply\".to_string()));\n\n        let engine = EngineBuilder::new()\n            .with_platform(Box::new(DummyPlatform))\n            .with_provider(Arc::new(mock_provider))\n            .build().unwrap();\n\n        let sender = engine.event_sender.as_ref().unwrap().clone();\n        tokio::spawn(async move {\n            engine.run().await;\n        });\n\n        sender.send(Event {\n            platform: \"nonexistent\".to_string(), // hit line 114\n            scope: Scope::Public { channel_id: \"test\".into(), user_id: \"test\".into() },\n            author_name: \"Test\".to_string(),\n            author_id: \"test\".into(),\n            content: \"Ping\".to_string(),\n        }).await.unwrap();\n        sleep(Duration::from_millis(50)).await;\n    }\n\n    mockall::mock! {\n        pub TelemetryPlatform {}\n        #[async_trait::async_trait]\n        impl Platform for TelemetryPlatform {\n            fn name(\u0026self) -\u003e \u0026str;\n            async fn start(\u0026self, sender: mpsc::Sender\u003cEvent\u003e) -\u003e Result\u003c(), crate::platforms::PlatformError\u003e;\n            async fn send(\u0026self, response: Response) -\u003e Result\u003c(), crate::platforms::PlatformError\u003e;\n        }\n    }\n\n    #[tokio::test]\n    async fn test_engine_telemetry_streaming() {\n        use crate::providers::MockProvider;\n        use tokio::time::{sleep, Duration};\n        \n        let mut mock_provider = MockProvider::new();\n        mock_provider\n            .expect_generate()\n            .returning(|_sys, _hist, _req, _ctx, tx_opt| {\n                if let Some(tx) = tx_opt {\n                    let tx_clone = tx.clone();\n                    tokio::spawn(async move {\n                        let _ = tx_clone.send(\"think \".to_string()).await;\n                        let _ = tx_clone.send(\"hard\".to_string()).await;\n                    });\n                }\n                Ok(\"Final\".to_string())\n            });\n\n        let mut mock_platform = MockTelemetryPlatform::new();\n        mock_platform.expect_name().return_const(\"telemetry_plat\".to_string());\n        mock_platform.expect_start().returning(|_| Ok(()));\n        // Complete telemetry (1) + final response (1) = at least 2\n        mock_platform.expect_send().times(2..).returning(|_| Ok(()));\n\n        let engine = EngineBuilder::new()\n            .with_platform(Box::new(mock_platform))\n            .with_provider(Arc::new(mock_provider))\n            .build().unwrap();\n\n        let sender = engine.event_sender.as_ref().unwrap().clone();\n        tokio::spawn(async move {\n            engine.run().await;\n        });\n\n        sender.send(Event {\n            platform: \"telemetry_plat:123\".to_string(),\n            scope: Scope::Public { channel_id: \"test\".into(), user_id: \"test\".into() },\n            author_name: \"TestUser\".to_string(),\n            author_id: \"test\".into(),\n            content: \"Ping\".to_string(),\n        }).await.unwrap();\n\n        // Wait for debounce (800ms) + processing\n        sleep(Duration::from_millis(2000)).await;\n    }\n\n    #[tokio::test]\n    async fn test_engine_telemetry_debounce_fires() {\n        // Test that the debounce timeout actually flushes thinking text\n        use crate::providers::MockProvider;\n        use std::sync::atomic::{AtomicBool, Ordering};\n        use tokio::time::{sleep, Duration};\n        \n        // Use a flag to track if a telemetry send was received\n        let got_thinking = Arc::new(AtomicBool::new(false));\n        let got_thinking_clone = got_thinking.clone();\n\n        let mut mock_provider = MockProvider::new();\n        mock_provider\n            .expect_generate()\n            .returning(|_sys, _hist, _req, _ctx, tx_opt| {\n                // Send a token, then keep the channel open long enough for debounce to fire\n                if let Some(tx) = tx_opt {\n                    let tx_clone = tx.clone();\n                    tokio::spawn(async move {\n                        let _ = tx_clone.send(\"reasoning token\".to_string()).await;\n                        // Hold the channel open past the 800ms eq!(format_elapsed(60), \"1.0m\");\n        assert_eq!(format_elapsed(90), \"1.5m\");\n        assert_eq!(format_elapsed(120), \"2.0m\");\n    }\n\n    #[test]\n    fn test_repair_planner_json_pure_conversation() {\n        let raw = \"This is just pure conversation without any JSON braces.\";\n        let repaired = Engine::repair_planner_json(raw);\n        assert_eq!(repaired, r#\"{\"tasks\": []}\"#);\n    }\n\n    #[test]\n    fn test_repair_planner_json_clean() {\n        let input = r#\"{\"tasks\": [{\"task_id\": \"step_1\", \"drone_type\": \"researcher\", \"description\": \"test\", \"depends_on\": []}]}\"#;\n        let result = Engine::repair_planner_json(input);\n        assert_eq!(result, input);\n    }\n\n    #[test]\n    fn test_repair_planner_json_markdown_fences() {\n        let input = \"```json\\n{\\\"tasks\\\": []}\\n```\";\n        let result = Engine::repair_planner_json(input);\n        assert_eq!(result, \"{\\\"tasks\\\": []}\");\n    }\n\n    #[test]\n    fn test_repair_planner_json_trailing_commas() {\n        let input = r#\"{\"tasks\": [{\"task_id\": \"s1\", \"drone_type\": \"r\", \"description\": \"d\", \"depends_on\": [],},]}\"#;\n        let result = Engine::repair_planner_json(input);\n        // Should be valid JSON after repair\n        assert!(serde_json::from_str::\u003ccrate::swarm::planner::SwarmPlan\u003e(\u0026result).is_ok());\n    }\n\n    #[test]\n    fn test_repair_planner_json_conversational_preamble() {\n        let input = \"Sure! Here is the plan:\\n\\n{\\\"tasks\\\": []}\";\n        let result = Engine::repair_planner_json(input);\n        assert_eq!(result, \"{\\\"tasks\\\": []}\");\n    }\n\n    #[test]\n    fn test_repair_planner_json_bom() {\n        let input = \"\\u{feff}{\\\"tasks\\\": []}\";\n        let result = Engine::repair_planner_json(input);\n        assert_eq!(result, \"{\\\"tasks\\\": []}\");\n    }\n\n    #[tokio::test]\n    async fn test_engine_observer_retry_loop() {\n        use crate::providers::MockProvider;\n        use crate::engine::tests::DummyPlatform;\n        use std::sync::atomic::{AtomicUsize, Ordering};\n        use tokio::time::{sleep, Duration};\n\n        let call_count = Arc::new(AtomicUsize::new(0));\n        let call_count_ptr = call_count.clone();\n\n        let mut mock_provider = MockProvider::new();\n        mock_provider\n            .expect_generate()\n            .returning(move |_, _, event, _ctx, _| {\n                if event.author_name == \"Audit\" {\n                    let count = call_count_ptr.fetch_add(1, Ordering::SeqCst);\n                    if count == 0 {\n                        Ok(r#\"{\"verdict\": \"BLOCKED\", \"reason\": \"Testing\", \"guidance\": \"Fix it\"}\"#.to_string())\n                    } else {\n                        Ok(r#\"{\"verdict\": \"ALLOWED\", \"reason\": \"Safe\", \"guidance\": \"None\"}\"#.to_string())\n                    }\n                } else {\n                    Ok(\"Candidate\".to_string())\n                }\n            });\n\n        let engine = EngineBuilder::new()\n            .with_platform(Box::new(DummyPlatform))\n            .with_provider(Arc::new(mock_provider))\n            .build().unwrap();\n\n        let sender = engine.event_sender.as_ref().unwrap().clone();\n        tokio::spawn(async move {\n            engine.run().await;\n        });\n\n        sender.send(Event {\n            platform: \"dummy\".to_string(),\n            scope: Scope::Public { channel_id: \"test\".into(), user_id: \"test\".into() },\n            author_name: \"TestUser\".to_string(),\n            author_id: \"test\".into(),\n            content: \"Ping\".to_string(),\n        }).await.unwrap();\n\n        sleep(Duration::from_millis(150)).await;\n        // Verify observer ran exactly twice (blocked once, allowed once)\n        assert_eq!(call_count.load(Ordering::SeqCst), 2);\n    }\n\n    #[tokio::test]\n    async fn test_engine_swarm_execution() {\n        use crate::providers::MockProvider;\n est_engine_swarm_invalid_json() {\n        // This test ensures the `Err` and fallback parsing branches are hit\n        // when the planner outputs garbled JSON or the Provider outright fails during planning.\n        use crate::providers::{MockProvider, ProviderError};\n        use crate::engine::tests::DummyPlatform;\n        use tokio::time::{sleep, Duration};\n\n        let mut mock_provider = MockProvider::new();\n        mock_provider\n            .expect_generate()\n            .returning(|sys, _, _, _ctx, _| {\n                if sys.contains(\"Swarm Queen Planner\") {\n                    // Provider fails entirely during the planning phase\n                    Err(ProviderError::ConnectionError(\"Planner offline\".into()))\n                } else {\n                    // It should fallback to empty plan and proceed to assembler\n                    Ok(\"Final generic response\".to_string())\n                }\n            });\n\n        let engine = EngineBuilder::new()\n            .with_platform(Box::new(DummyPlatform))\n            .with_provider(Arc::new(mock_provider))\n            .build()\n            .unwrap();\n\n        let sender = engine.event_sender.as_ref().unwrap().clone();\n        \n        tokio::spawn(async move {\n            engine.run().await;\n        });\n\n        sender.send(Event {\n            platform: \"dummy\".to_string(),\n            scope: Scope::Public { channel_id: \"test\".into(), user_id: \"test\".into() },\n            author_name: \"TestUser\".to_string(),\n            author_id: \"test\".into(),\n            content: \"Ping err\".to_string(),\n        }).await.unwrap();\n\n        sleep(Duration::from_millis(150)).await;\n    }\n\n    #[tokio::test]\n    async fn test_engine_clean_admin() {\n        use crate::providers::MockProvider;\n        use crate::engine::tests::DummyPlatform;\n        use crate::models::capabilities::AgentCapabilities;\n        use tokio::time::{sleep, Duration};\n\n        let mock_provider = MockProvider::new();\n        \n        let test_dir = std::env::temp_dir().join(format!(\"hive_engine_test_admin_{}\", std::time::SystemTime::now().duration_since(std::time::UNIX_EPOCH).unwrap().as_nanos()));\n        let mut caps = AgentCapabilities::default();\n        caps.admin_users.push(\"admin_test\".into());\n\n        let engine = EngineBuilder::new()\n            .with_platform(Box::new(DummyPlatform))\n            .with_provider(Arc::new(mock_provider))\n            .with_memory(crate::memory::MemoryStore::new(Some(test_dir)))\n            .build()\n            .unwrap();\n            \n        // Because fields are mostly public or immutable, we build a fresh engine and override caps\n        let mut engine = engine;\n        engine.capabilities = Arc::new(caps);\n\n        let pub_scope = Scope::Public { channel_id: \"test\".into(), user_id: \"test\".into() };\n        engine.memory.add_event(Event {\n            platform: \"dummy\".to_string(),\n            scope: pub_scope.clone(),\n            author_name: \"TestUser\".to_string(),\n            author_id: \"test\".into(),\n            content: \"Ping\".to_string(),\n        }).await;\n        \n        assert_eq!(engine.memory.get_working_history(\u0026pub_scope).await.len(), 1);\n\n        let sender = engine.event_sender.as_ref().unwrap().clone();\n        \n        let mem_ref = engine.memory.clone();\n        tokio::spawn(async move {\n            engine.run().await;\n        });\n\n        sender.send(Event {\n            platform: \"dummy\".to_string(),\n            scope: Scope::Public { channel_id: \"test\".into(), user_id: \"test\".into() },\n            author_name: \"AdminUser\".to_string(),\n            author_id: \"admin_test\".into(),\n            content: \"/clean\".to_string(),\n        }).await.unwrap();\n\n        sleep(Duration::from_millis(300)).await;\n        \n        assert_eq!(mem_ref.get_working_history(\u0026pub_scope).await.len(), 0);\n    }\n\n    #[tokio::test]\n 8,"coverable":67},{"path":["/","Users","mettamazza","Desktop","HIVE","src","main.rs"],"content":"#![allow(unexpected_cfgs)]\n\nmod engine;\nmod memory;\nmod models;\nmod platforms;\npub mod prompts;\nmod providers;\npub mod swarm;\npub mod teacher;\n\nuse std::sync::Arc;\nuse tokio::io::AsyncBufRead;\nuse crate::engine::EngineBuilder;\nuse crate::models::capabilities::AgentCapabilities;\nuse crate::platforms::discord::DiscordPlatform;\nuse crate::platforms::cli::CliPlatform;\nuse crate::providers::ollama::OllamaProvider;\n\n#[cfg(not(tarpaulin_include))]\n#[cfg(not(test))]\nfn get_reader() -\u003e Box\u003cdyn AsyncBufRead + Unpin + Send + Sync\u003e {\n    Box::new(tokio::io::BufReader::new(tokio::io::stdin()))\n}\n\n#[cfg(not(tarpaulin_include))]\n#[cfg(test)]\nfn get_reader() -\u003e Box\u003cdyn AsyncBufRead + Unpin + Send + Sync\u003e {\n    Box::new(std::io::Cursor::new(b\"\"))\n}\n\n#[cfg(not(tarpaulin_include))]\npub async fn run_app() {\n    println!(\"Starting HIVE...\");\n    let reader = get_reader();\n\n    let discord_token = std::env::var(\"DISCORD_TOKEN\").unwrap_or_default();\n\n    // 1. Initialize Core Storage Systems First\n    let memory_store = Arc::new(crate::memory::MemoryStore::default());\n    let provider = Arc::new(OllamaProvider::new());\n    \n    // 2. Initialize Swarm Manager to gather Native Tolls (Drones)\n    let swarm_manager = crate::swarm::SwarmManager::new(provider.clone(), memory_store.clone());\n    let native_drones = swarm_manager.get_drone_names();\n\n    // 3. Inject Dynamic Drone Tooling into Capabilities \n    let capabilities = AgentCapabilities {\n        admin_users: vec![\n            \"1299810741984956449\".into(), // metta_mazza\n            \"1282286389953695745\".into(), // afreakyfrog\n            \"local_admin\".into(),         // CLI access\n        ],\n        has_terminal_access: true,\n        has_internet_access: true,\n        admin_tools: vec![\n            \"run_bash_command\".into(),\n            \"write_file\".into(),\n            \"delete_file\".into(),\n        ],\n        default_tools: native_drones, // \u003c-- Dynamically Assigned \n    };\n\n    // 4. Build the engine with our defined platforms and injected contexts\n    let engine = EngineBuilder::new()\n        .with_platform(Box::new(DiscordPlatform::new(discord_token)))\n        .with_platform(Box::new(CliPlatform::new(reader)))\n        .with_provider(provider)\n        .with_capabilities(capabilities)\n        .with_swarm(Arc::new(swarm_manager))\n        .build()\n        .expect(\"Failed to build Engine\");\n\n    // Run the engine indefinitely\n    engine.run().await;\n}\n\n#[cfg(not(tarpaulin_include))]\n#[tokio::main]\nasync fn main() {\n    run_app().await;\n}\n\n\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","mettamazza","Desktop","HIVE","src","memory","autosave.rs"],"content":"use std::path::PathBuf;\nuse crate::models::scope::Scope;\n\n/// Tier 2: Autosave System\n/// Triggered when Working Memory hits the predefined token limit.\n/// Embeds, dates, and saves the transcript for long-term indexing.\n#[derive(Debug, Clone)]\npub struct AutosaveManager {\n    // Structure to handle saving JSON/Text files and managing LLM summary calls.\n}\n\nimpl Default for AutosaveManager {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\nimpl AutosaveManager {\n    pub fn new() -\u003e Self {\n        Self {}\n    }\n\n    /// Gets the base directory for memory storage\n    #[allow(dead_code)]\n    fn get_memory_dir() -\u003e PathBuf {\n        PathBuf::from(\"memory\")\n    }\n\n    /// Triggers the autosave process:\n    /// 1. Reads the current working transcript\n    /// 2. Asks the LLM to summarize and title it\n    /// 3. Moves the transcript to the autosaves directory\n    /// 4. Returns the generated title and summary\n    pub async fn archive_transcript(\n        \u0026self, \n        _scope: \u0026Scope, \n        _transcript_path: PathBuf\n    ) -\u003e std::io::Result\u003c(String, String)\u003e {\n        // Placeholder for the actual LLM call and file moving sequence.\n        // In the next step, we will hook this up to the Prompt Engine.\n        \n        let dummy_title = \"Archived_Session\".to_string();\n        let dummy_summary = \"A summary of the previous events.\".to_string();\n        \n        // Return the summary so the Continuity Engine can inject it into the new Working Memory.\n        Ok((dummy_title, dummy_summary))\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[tokio::test]\n    async fn test_autosave_manager_default() {\n        let manager1 = AutosaveManager::default();\n        let manager2 = AutosaveManager::new();\n        // Since it's an empty struct, we just ensure it initializes without error\n        let _ = manager1;\n        let _ = manager2;\n        \n        let dir = AutosaveManager::get_memory_dir();\n        assert_eq!(dir.to_str().unwrap(), \"memory\");\n    }\n\n    #[tokio::test]\n    async fn test_archive_transcript_stub() {\n        let manager = AutosaveManager::new();\n        let (title, summary) = manager.archive_transcript(\u0026Scope::Public { channel_id: \"test\".into(), user_id: \"test\".into() }, PathBuf::from(\"dummy\")).await.unwrap();\n        assert_eq!(title, \"Archived_Session\");\n        assert_eq!(summary, \"A summary of the previous events.\");\n    }\n}\n","traces":[{"line":13,"address":[],"length":0,"stats":{"Line":0}},{"line":14,"address":[],"length":0,"stats":{"Line":0}},{"line":19,"address":[],"length":0,"stats":{"Line":2}},{"line":25,"address":[],"length":0,"stats":{"Line":0}},{"line":26,"address":[],"length":0,"stats":{"Line":0}},{"line":34,"address":[],"length":0,"stats":{"Line":0}},{"line":42,"address":[],"length":0,"stats":{"Line":0}},{"line":43,"address":[],"length":0,"stats":{"Line":0}},{"line":46,"address":[],"length":0,"stats":{"Line":0}}],"covered":1,"coverable":9},{"path":["/","Users","mettamazza","Desktop","HIVE","src","memory","mod.rs"],"content":"use std::sync::Arc;\nuse std::path::PathBuf;\nuse crate::models::message::Event;\nuse crate::models::scope::Scope;\n\npub mod working;\npub mod autosave;\npub mod synaptic;\npub mod timeline;\npub mod scratch;\n\npub use working::*;\npub use autosave::*;\npub use synaptic::*;\npub use timeline::*;\npub use scratch::*;\n\nuse std::collections::HashMap;\nuse tokio::sync::RwLock;\n/// The Unified 5-Tier Memory Store.\n#[derive(Debug, Clone)]\npub struct MemoryStore {\n    pub working: WorkingMemory,\n    pub timeline: TimelineManager,\n    pub synaptic: Neo4jGraph,\n    pub scratch: Scratchpad,\n    pub autosave: AutosaveManager,\n    /// Tracks recent active participants in Public channels. Maps channel_id -\u003e Vec\u003cauthor_name\u003e\n    rosters: Arc\u003cRwLock\u003cHashMap\u003cString, Vec\u003cString\u003e\u003e\u003e\u003e,\n}\n\nimpl Default for MemoryStore {\n    fn default() -\u003e Self {\n        Self::new(None)\n    }\n}\n\nimpl MemoryStore {\n    pub fn new(base_dir: Option\u003cPathBuf\u003e) -\u003e Self {\n        #[cfg(test)]\n        let default_dir = std::env::temp_dir().join(format!(\"hive_mem_test_store_{}\", std::time::SystemTime::now().duration_since(std::time::UNIX_EPOCH).unwrap().as_nanos()));\n        #[cfg(not(test))]\n        let default_dir = PathBuf::from(\"memory\");\n\n        let memory_dir = base_dir.unwrap_or(default_dir);\n        let working = WorkingMemory::new(Some(memory_dir.clone()));\n        let autosave = AutosaveManager::new();\n        let synaptic = Neo4jGraph::new();\n        let timeline = TimelineManager::new(Some(memory_dir.clone()));\n        let scratch = Scratchpad::new(Some(memory_dir.clone()));\n\n        Self {\n            working,\n            timeline,\n            synaptic,\n            scratch,\n            autosave,\n            rosters: Arc::new(RwLock::new(HashMap::new())),\n        }\n    }\n\n    /// Asynchronously loads persistent memory from disk on boot.\n    pub async fn init(\u0026self) {\n        self.working.load_persisted().await;\n    }\n\n    /// Stores a new event into the primary working memory and appends to the timeline.\n    pub async fn add_event(\u0026self, event: Event) {\n        // Track roster for Public scopes\n        if let Scope::Public { channel_id, .. } = \u0026event.scope {\n            let mut rosters = self.rosters.write().await;\n            let channel_roster = rosters.entry(channel_id.clone()).or_insert_with(Vec::new);\n            \n            // Add if not already present; push to end to signify recency\n            // Keep the last 10 unique speakers.\n            if let Some(pos) = channel_roster.iter().position(|name| name == \u0026event.author_name) {\n                // If they exist, move them to the end (most recently spoken)\n                let name = channel_roster.remove(pos);\n                channel_roster.push(name);\n            } else {\n                channel_roster.push(event.author_name.clone());\n                if channel_roster.len() \u003e 10 {\n                    channel_roster.remove(0); // Pop oldest\n                }\n            }\n        }\n\n        self.working.add_event(event.clone()).await;\n        self.timeline.append_event(\u0026event).await;\n    }\n\n    /// Fetches a comma-separated list of active participants in a channel\n    pub async fn get_roster(\u0026self, channel_id: \u0026str) -\u003e Option\u003cString\u003e {\n        let rosters = self.rosters.read().await;\n        if let Some(roster) = rosters.get(channel_id) {\n            if roster.is_empty() {\n                None\n            } else {\n                Some(roster.join(\", \"))\n            }\n        } else {\n            None\n        }\n    }    \n    /// Retrieves the short-term working history for the requesting scope.\n    pub async fn get_working_history(\u0026self, requesting_scope: \u0026Scope) -\u003e Vec\u003cEvent\u003e {\n        self.working.get_history(requesting_scope).await\n    }\n\n    /// Checks if the active working memory has breached the token limit.\n    /// If so, it triggers an archive event and injects a Continuity Summary.\n    pub async fn check_and_trigger_autosave(\u0026self, scope: \u0026Scope) -\u003e Option\u003cEvent\u003e {\n        let current_tokens = self.working.current_tokens().await;\n        if current_tokens \u003e= self.working.max_tokens() {\n            println!(\"Context window limit reached ({} tokens). Triggering Autosave...\", current_tokens);\n            \n            // In a full implementation, AutosaveManager reads the file and calls the LLM.\n            // For now, we simulate the LLM summarization.\n            let dummy_path = std::path::PathBuf::from(\"dummy\");\n            if let Ok((title, summary)) = self.autosave.archive_transcript(scope, dummy_path).await {\n                \n                // Clear the working memory for this scope\n                self.working.clear(scope).await;\n\n                // Create a Continuity Event to seed the fresh transcript\n                let continuity_event = Event {\n                    platform: \"system:memory\".to_string(),\n                    scope: scope.clone(),\n                    author_name: \"System\".to_string(),\n                    author_id: \"test\".into(),\n                    content: format!(\n                        \"*** CONTINUITY SUMMARY ***\\n\\n\\\n                        The previous session hit the maximum context limit and was archived under the title: [{}].\\n\\n\\\n                        Summary of recent events:\\n{}\\n\\n\\\n                        Directions: If you need to recall older details, use your memory search tools to retrieve '{}'.\\n\\n\\\n                        You are now operating in a fresh context window. Continue seamlessly.\",\n                        title, summary, title\n                    ),\n                };\n                \n                // Inject the continuity event into the fresh working memory AND timeline\n                self.timeline.append_event(\u0026continuity_event).await;\n                self.working.add_event(continuity_event.clone()).await;\n                \n                return Some(continuity_event);\n            }\n        }\n        None\n    }\n\n    /// Triggers a total factory reset of the memory system (Private, Public, Timelines, etc.)\n    pub async fn wipe_all(\u0026self) {\n        // 1. Wipe Active RAM State\n        self.working.clear_all().await;\n        self.rosters.write().await.clear();\n\n        // 2. Wipe Physical Hard Drive Backups\n        let dir = self.working.get_memory_dir();\n        if let Err(e) = tokio::fs::remove_dir_all(\u0026dir).await {\n            eprintln!(\"⚠️ Failed standard delete of {:?}: {}. Attempting force wipe...\", dir, e);\n            let _ = std::process::Command::new(\"rm\").arg(\"-rf\").arg(\u0026dir).status();\n            // Re-create the dir immediately so it's fresh without hitting Not Found errs\n            let _ = tokio::fs::create_dir_all(\u0026dir).await;\n        }\n        \n        println!(\"⚠️ FACTORY RESET EXECUTED: All persistent memory has been wiped.\");\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n\n    #[tokio::test]\n    async fn test_memorystore_default() {\n        let store = MemoryStore::default();\n        let store2 = MemoryStore::default();\n        // Just verify it doesn't panic\n        assert_eq!(store.working.max_tokens(), 256000);\n        assert_eq!(store2.working.max_tokens(), 256000);\n    }\n\n    #[tokio::test]\n    async fn test_memorystore_add_and_get() {\n        let store = MemoryStore::default();\n        let pub_scope = Scope::Public { channel_id: \"test\".into(), user_id: \"test\".into() };\n\n        let event = Event {\n            platform: \"test\".into(),\n            scope: pub_scope.clone(),\n            author_name: \"User\".into(),\n            author_id: \"test\".into(),\n            content: \"Ping\".into(),\n        };\n\n        store.add_event(event).await;\n        \n        // Verify working memory handles it\n        let hist = store.get_working_history(\u0026pub_scope).await;\n        assert_eq!(hist.len(), 1);\n        assert_eq!(hist[0].content, \"Ping\");\n\n        // Timeline handles it internally (covered by timeline.rs tests)\n\n\n    }\n\n    #[tokio::test]\n    async fn test_check_and_trigger_autosave() {\n\n        let store = MemoryStore::default();\n        let scope = Scope::Public { channel_id: \"test\".into(), user_id: \"test\".into() };\n\n        // Force working memory to breach 256k limit by setting max to 0 directly or adding a giant event\n        // Since max_tokens is private, we will just add a big fake token count or loop\n        // Alternatively, add a massive event that exceeds 256k chars / 4\n        let giant_content = \"A\".repeat(1_025_000); // \u003e 256,000 tokens\n\n        let event = Event {\n            platform: \"test\".into(),\n            scope: scope.clone(),\n            author_name: \"User\".into(),\n            author_id: \"test\".into(),\n            content: giant_content,\n        };\n\n        store.add_event(event).await;\n\n        // Trigger autosave\n        let continuity = store.check_and_trigger_autosave(\u0026scope).await;\n        assert!(continuity.is_some());\n\n        let ce = continuity.unwrap();\n        assert_eq!(ce.author_name, \"System\");\n        assert!(ce.content.contains(\"*** CONTINUITY SUMMARY ***\"));\n\n        // Verify working memory was cleared except for the continuity event\n        let hist = store.get_working_history(\u0026scope).await;\n        assert_eq!(hist.len(), 1);\n        assert_eq!(hist[0].content, ce.content);\n\n\n    }\n\n    #[tokio::test]\n    async fn test_memorystore_wipe_all() {\n        let test_dir = std::env::temp_dir().join(format!(\"hive_store_wipe_{}\", std::time::SystemTime::now().duration_since(std::time::UNIX_EPOCH).unwrap().as_nanos()));\n        let store = MemoryStore::new(Some(test_dir.clone()));\n        // Since get_memory_dir is hardcoded to \"memory\" here, we'll let it create it then wipe it.\n        let pub_scope = Scope::Public { channel_id: \"test\".into(), user_id: \"test\".into() };\n        let event = Event {\n            platform: \"test\".into(),\n            scope: pub_scope.clone(),\n            author_name: \"User\".into(),\n            author_id: \"test\".into(),\n            content: \"Test factory wipe\".into(),\n        };\n\n        store.add_event(event).await;\n        \n        // Ensure it has data\n        assert_eq!(store.get_working_history(\u0026pub_scope).await.len(), 1);\n        \n        // Wipe it all\n        store.wipe_all().await;\n        \n        // Verify WorkingMemory RAM is cleared\n        assert_eq!(store.get_working_history(\u0026pub_scope).await.len(), 0);\n        \n        // Verify working directory was unlinked\n        assert!(!test_dir.exists());\n    }\n\n    #[tokio::test]\n    async fn test_roster_speaker_reorder() {\n        let test_dir = std::env::temp_dir().join(format!(\"hive_mem_test_roster_{}\", std::time::SystemTime::now().duration_since(std::time::UNIX_EPOCH).unwrap().as_nanos()));\n        let store = MemoryStore::new(Some(test_dir.clone()));\n        let s = Scope::Public { channel_id: \"reorder\".into(), user_id: \"u\".into() };\n        store.add_event(Event { platform: \"t\".into(), scope: s.clone(), author_name: \"Alice\".into(), author_id: \"a\".into(), content: \"1\".into() }).await;\n        store.add_event(Event { platform: \"t\".into(), scope: s.clone(), author_name: \"Bob\".into(), author_id: \"b\".into(), content: \"2\".into() }).await;\n        store.add_event(Event { platform: \"t\".into(), scope: s.clone(), author_name: \"Alice\".into(), author_id: \"a\".into(), content: \"3\".into() }).await;\n        assert_eq!(store.get_roster(\"reorder\").await.unwrap(), \"Bob, Alice\");\n    }\n\n    #[tokio::test]\n    async fn test_roster_overflow() {\n        let test_dir = std::env::temp_dir().join(format!(\"hive_mem_test_of_{}\", std::time::SystemTime::now().duration_since(std::time::UNIX_EPOCH).unwrap().as_nanos()));\n        let store = MemoryStore::new(Some(test_dir.clone()));\n        let s = Scope::Public { channel_id: \"of\".into(), user_id: \"u\".into() };\n        for i in 0..11 {\n            store.add_event(Event { platform: \"t\".into(), scope: s.clone(), author_name: format!(\"U{}\", i), author_id: format!(\"{}\", i), content: \"m\".into() }).await;\n        }\n        let r = store.get_roster(\"of\").await.unwrap();\n        assert!(!r.contains(\"U0\"));\n        assert!(r.contains(\"U10\"));\n    }\n\n    #[tokio::test]\n    async fn test_roster_none_for_missing() {\n        let test_dir = std::env::temp_dir().join(format!(\"hive_mem_test_mnfm_{}\", std::time::SystemTime::now().duration_since(std::time::UNIX_EPOCH).unwrap().as_nanos()));\n        let store = MemoryStore::new(Some(test_dir.clone()));\n        assert_eq!(store.get_roster(\"nope\").await, None);\n    }\n\n    #[tokio::test]\n    async fn test_private_no_roster() {\n        let test_dir = std::env::temp_dir().join(format!(\"hive_mem_test_pnr_{}\", std::time::SystemTime::now().duration_since(std::time::UNIX_EPOCH).unwrap().as_nanos()));\n        let store = MemoryStore::new(Some(test_dir.clone()));\n        let s = Scope::Private { user_id: \"dm\".into() };\n        store.add_event(Event { platform: \"t\".into(), scope: s, author_name: \"A\".into(), author_id: \"a\".into(), content: \"m\".into() }).await;\n        assert_eq!(store.get_roster(\"dm\").await, None);\n    }\n\n    #[tokio::test]\n    async fn test_init() {\n        let test_dir = std::env::temp_dir().join(format!(\"hive_mem_test_init_{}\", std::time::SystemTime::now().duration_since(std::time::UNIX_EPOCH).unwrap().as_nanos()));\n        let store = MemoryStore::new(Some(test_dir.clone()));\n        store.init().await;\n    }\n\n    #[tokio::t e tokio::fs::{self, OpenOptions};\nuse tokio::io::AsyncWriteExt;\nuse crate::models::scope::Scope;\n#[derive(Debug, Clone)]\npub struct Scratchpad {\n    base_dir: PathBuf,\n}\n\nimpl Default for Scratchpad {\n    fn default() -\u003e Self {\n        Self::new(None)\n    }\n}\n\nimpl Scratchpad {\n    pub fn new(base_dir: Option\u003cPathBuf\u003e) -\u003e Self {\n        #[cfg(test)]\n        let default_dir = std::env::temp_dir().join(format!(\"hive_mem_test_{}\", std::time::SystemTime::now().duration_since(std::time::UNIX_EPOCH).unwrap().as_nanos()));\n        #[cfg(not(test))]\n        let default_dir = PathBuf::from(\"memory\");\n\n        Self {\n            base_dir: base_dir.unwrap_or(default_dir),\n        }\n    }\n\n    /// Gets the specific scratchpad file path for a scope\n    fn get_scratchpad_path(\u0026self, scope: \u0026Scope) -\u003e PathBuf {\n        let mut path = self.base_dir.clone();\n        match scope {\n            Scope::Public { channel_id, .. } =\u003e path.push(format!(\"public_{}\", channel_id)),\n            Scope::Private { user_id } =\u003e path.push(format!(\"private_{}\", user_id)),\n        }\n        path.push(\"scratch\");\n        path.push(\"workspace.md\");\n        path\n    }\n\n    /// Reads the entire contents of the scratchpad. Returns an empty string if it doesn't exist.\n    pub async fn read(\u0026self, scope: \u0026Scope) -\u003e String {\n        let path = self.get_scratchpad_path(scope);\n        fs::read_to_string(\u0026path).await.unwrap_or_default()\n    }\n\n    /// Overwrites the scratchpad with new content.\n    pub async fn write(\u0026self, scope: \u0026Scope, content: \u0026str) -\u003e std::io::Result\u003c()\u003e {\n        let path = self.get_scratchpad_path(scope);\n        if let Some(parent) = path.parent() {\n            fs::create_dir_all(parent).await?;\n        }\n        fs::write(\u0026path, content).await\n    }\n\n    /// Appends text to the end of the scratchpad.\n    pub async fn append(\u0026self, scope: \u0026Scope, content: \u0026str) -\u003e std::io::Result\u003c()\u003e {\n        let path = self.get_scratchpad_path(scope);\n        if let Some(parent) = path.parent() {\n            fs::create_dir_all(parent).await?;\n        }\n        let mut file = OpenOptions::new()\n            .create(true)\n            .append(true)\n            .open(\u0026path)\n            .await?;\n        \n        file.write_all(format!(\"{}\\n\", content).as_bytes()).await\n    }\n    \n    /// Clears the scratchpad completely.\n    pub async fn clear(\u0026self, scope: \u0026Scope) -\u003e std::io::Result\u003c()\u003e {\n        let path = self.get_scratchpad_path(scope);\n        if path.exists() {\n            fs::remove_file(\u0026path).await\n        } else {\n            Ok(())\n        }\n    }\n\n    /// Reads the entire contents of the scratchpad. Returns an empty string if it doesn't exist.\n    pub async fn search(\u0026self, _query: \u0026str) -\u003e Vec\u003cString\u003e {\n        // Stub for retrieving Neo4j conceptual nodes\n        Vec::new()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[tokio::test]\n    async fn test_scratch_operations() {\n        let pub_scope = Scope::Private { user_id: format!(\"test_scratch_ops_pub_{}\", std::time::SystemTime::now().duration_since(std::time::UNIX_EPOCH).unwrap().as_nanos()) };\n        let scratch = Scratchpad::new(None);\n        let _ = scratch.clear(\u0026pub_scope).await;\n        \n        let scratch_default = Scratchpad::default();\n        let _ = scratch_default.clear(\u0026pub_scope).await;\n        // Call it a second time to hit the `Ok(())` branch when the file doesn't exist anymore\n        let _ = scratch_default.clear(\u0026pub_scope).await;\n        assert_eq!(scratch_default.read(\u0026pub_scope).await, \"\");\n\n        let scratch = Scratchpad::new(None);\n        \n        // Write\n        scratch.write(\u0026pub_scope, \"First note\").await.unwrap();\n
