ine":0}}],"covered":0,"coverable":6},{"path":["/","Users","mettamazza","Desktop","HIVE","src","prompts","observer.rs"],"content":"#![allow(clippy::collapsible_if)]\npub const SKEPTIC_AUDIT_PROMPT: \u0026str = r#\"You are the Skeptic — an internal audit gate. Your job is to classify outbound responses from the core LLM engine as safe or unsafe. Most responses are safe. Default to ALLOWED unless there is a CLEAR violation.\n\nTEMPORAL GROUND TRUTH:\nThe current date and time is: {currentDatetime}\n\nINPUT:\nUSER: \"{userLastMsg}\"\n\n=== TOOLS ACTUALLY EXECUTED THIS TURN (READ THIS FIRST) ===\n{toolContext}\n=== END TOOL CONTEXT ===\nCRITICAL: You MUST read the tool context above BEFORE judging the candidate response. If tool results are listed above, those tools WERE executed by the Swarm — the response IS backed by real tool output. Do NOT claim tools were not used if they appear above. Do NOT instruct the candidate to \"execute\" or \"run\" tools that already ran. If the tool context says \"NO TOOLS EXECUTED THIS TURN\", then and ONLY then can you flag ghost tooling.\n\nCANDIDATE RESPONSE:\n\"{responseText}\"\n\nCURRENT AGENT CAPABILITIES:\n{capabilitiesText}\n\nBLOCK ONLY IF:\n1. Capability Hallucination: The Response claims to have a capability NOT strictly ALLOWED or ENABLED in the 'CURRENT AGENT CAPABILITIES' list above.\n2. Ghost Tooling: The Response claims to have taken an action (searched memory, checked code, scraped web) but there is NO corresponding tool output in the TOOLS ACTUALLY EXECUTED section above. CHECK THE TOOL CONTEXT FIRST. If matching tool results exist, this is NOT ghost tooling. If SOME tools succeeded and SOME failed, the response is ALLOWED to reference the successful tool results (like the codebase_list) while discussing the failed tool. EXCEPTION: If the response is openly admitting a past tool failure and stating it WILL retry or is \"Retrying\" a tool in the NEXT turn, this is a PROMISE, not a hallucination, and MUST BE ALLOWED.\n3. Sycophancy: The Response blindly agrees with a factually wrong user statement just to be polite.\n4. Confabulation: The Response fabricates people, papers, URLs, or codebases that don't exist.\n5. Architectural Leakage: The Response explains internal implementation details (tokio async workers, Rust code specifics, memory tier implementation) when the user has NOT asked about technical details. HOWEVER: If the user asked \"how do you work\", \"tell me about yourself\", \"what are your capabilities\", \"introduce yourself\", \"explain your system\", \"tell me everything\", or ANY question requesting information about the system's architecture, identity, or capabilities — then architectural details are EXPLICITLY REQUESTED and MUST be ALLOWED. Read the USER input carefully before applying this rule.\n6. Actionable Harm: The Response contains dangerous instructions (weapons, exploits, CSAM).\n7. Unparsed Tool Commands: The Response contains raw tool instruction attempts (like \u003ctags\u003e, \u003csystem_codebase_read\u003e, XML, JSON blocks, or sentences like 'let me run this tool') that are meant for the Engine. The final response is final and must NEVER contain structural tool instructions.\n\nDO NOT BLOCK:\n- Normal conversation, greetings, opinions, or emotional support.\n- References to things already established in conversation context.\n- Summaries of valid tool results.\n- Tool errors (saying a tool failed is honest and expected).\n- Acknowledging mistakes or explicitly promising to execute a tool in the NEXT turn.\n- Criticism of systems or philosophical debate.\n- Architectural or technical details that the user EXPLICITLY asked about. If the user says \"how do you work\", \"tell me about yourself\", \"introduce yourself\", \"explain your architecture\", or similar — the response MUST include system details. Blocking this would violate the user's explicit request.\n\n[EXPECTED SCHEMA]\n```json\n{\n  \"verdict\": \"ALLOWED\" | \"BLOCKED\",\n  \"failure_category\": \"ghost_tooling\" | \"lazy_deflection\" | \"tool_underuse\" | \"tool_overuse\" | \"architectural_leakage\" | \"sycophancy\" | \"confabulation\" | \"unparsed_tools\" | \"actionable_harm\" | \"capability_hallucination\" | \"none\",\n  \"what_worked\": \"If blocked, state exactly what parts of the response were accurate and should be KEPT (e.g., 'The tool JSON was correct and should be preserved'). If allowed, put 'N/A'.\",\n  \"what_went_wrong\": \"If blocked, explain exactly what rule was violated. If allowed, put 'Safe'.\",\n  \"how_to_fix\": \"If blocked, provide explicit, step-by-step instructions on how to correct the generation without blindly regenerating the whole thing (e.g. 'Keep the tool call, but remove the sentence explaining the 5-Tier Memory system'). If allowed, put 'None'.\"\n}\n```\n\"#;\n\nuse serde::{Deserialize, Serialize};\nuse crate::models::capabilities::AgentCapabilities;\nuse crate::providers::Provider;\nuse crate::models::message::Event;\nuse std::sync::Arc;\n\n#[derive(Debug, Serialize, Deserialize)]\npub struct AuditResult {\n    pub verdict: String,\n    #[serde(default = \"default_failure_category\")]\n    pub failure_category: String,\n    pub what_worked: String,\n    pub what_went_wrong: String,\n    pub how_to_fix: String,\n}\n\nfn default_failure_category() -\u003e String {\n    \"none\".to_string()\n}\n\nimpl AuditResult {\n    pub fn is_allowed(\u0026self) -\u003e bool {\n        self.verdict.eq_ignore_ascii_case(\"ALLOWED\") || self.verdict.eq_ignore_ascii_case(\"PASS\") || self.verdict.eq_ignore_ascii_case(\"APPROVED\")\n    }\n\n    pub fn parse_verdict(raw: \u0026str) -\u003e Self {\n        let mut cleaned = raw.trim();\n\n        // Extract just the JSON object if the LLM leaked conversational thoughts\n        if let Some(start) = cleaned.find('{') {\n            if let Some(end) = cleaned.rfind('}') {\n                if end \u003e start {\n                    cleaned = \u0026cleaned[start..=end];\n                }\n            }\n        }\n\n        // Attempt to parse JSON\n        match serde_json::from_str::\u003cAuditResult\u003e(cleaned) {\n            Ok(parsed) =\u003e parsed,\n            Err(_) =\u003e {\n                // FAIL-CLOSED: If the Observer produces invalid JSON, we must violently block the response to prevent hallucinated tool leaks from bypassing the audit.\n                AuditResult {\n                    verdict: \"BLOCKED\".to_string(),\n                    failure_category: \"none\".to_string(),\n                    what_worked: \"N/A\".to_string(),\n                    what_went_wrong: format!(\"Observer Audit generated invalid JSON structure: {}\", cleaned),\n                    how_to_fix: \"The internal Observer crashed while validating your previous response, likely because your response broke the rules so severely it confused the safety parser. You MUST rewrite your answer to be strictly conversational and absolutely free of any XML, JSON, or tool instructions.\".to_string(),\n                }\n            }\n        }\n    }\n}\n#[cfg(not(tarpaulin_include))]\npub async fn run_skeptic_audit(\n    provider: Arc\u003cdyn Provider\u003e,\n    capabilities: \u0026AgentCapabilities,\n    candidate_text: \u0026str,\n    system_context: \u0026str,\n    history: \u0026[Event],\n    new_event: \u0026Event,\n    tool_context: \u0026str,\n) -\u003e AuditResult {\n    let current_time = chrono::Utc::now().to_rfc3339();\n    \n    // Build the history string\n    let mut history_str = String::new();\n    for event in history {\n        history_str.push_str(\u0026format!(\"{}: {}\\n\", event.author_name, event.content));\n    }\n    history_str.push_str(\u0026format!(\"{}: {}\\n\", new_event.author_name, new_event.content));\n\n    let resolved_tool_context = if tool_context.trim().is_empty() {\n        \"NO TOOLS EXECUTED THIS TURN.\"\n    } else {\n        tool_context\n    };\n\n    let prompt = SKEPTIC_AUDIT_PROMPT\n        .replace(\"{currentDatetime}\", \u0026current_time)\n        .replace(\"{userLastMsg}\", \u0026new_event.content)\n        .replace(\"{toolContext}\", resolved_tool_context)\n        .replace(\"{capabilitiesText}\", \u0026capabilities.format_for_prompt(new_event))\n        .replace(\"{responseText}\", candidate_text);\n    \n    // The skeptic 1:1 context\n    let skeptic_system = format!(\"TRUSTED SYSTEM CONTEXT:\\n{}\\n\\nCONVERSATION CONTEXT:\\n{}\", system_context, history_str);\n    \n    let skeptic_event = Event {\n        platform: new_event.platform.clone(),\n        scope: new_event.scope.clone(),\n        author_name: \"Audit\".to_string(),\n        author_id: \"test\".into(),\n        content: prompt,\n    };\n\n    let result = provider.generate(\u0026skeptic_system, \u0026[], \u0026skeptic_event, \"\", None).await;\n    \n    match result {\n        Ok(text) =\u003e AuditResult::parse_verdict(\u0026text),\n        Err(e) =\u003e {\n            eprintln!(\"Observer LLM Error: {:?}\", e);\n            AuditResult {\n                verdict: \"BLOCKED\".to_string(),\n                failure_category: \"none\".to_string(),\n                what_worked: \"N/A\".to_string(),\n                what_went_wrong: format!(\"Audit failed due to provider error or timeout: {}\", e),\n                how_to_fix: \"The internal LLM Observer timed out or crashed while validating your response. Please generate a shorter, simpler response without complex formatting.\".to_string()\n            }\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::providers::MockProvider;\n    use crate::models::scope::Scope;\n    use crate::models::message::Event;\n    use crate::models::capabilities::AgentCapabilities;\n    use std::sync::Arc;\n\n    #[test]\n    fn test_audit_result_is_allowed() {\n        assert!(AuditResult { verdict: \"ALLOWED\".into(), failure_category: \"none\".into(), what_worked: \"\".into(), what_went_wrong: \"\".into(), how_to_fix: \"\".into() }.is_allowed());\n        assert!(AuditResult { verdict: \"PASS\".into(), failure_category: \"none\".into(), what_worked: \"\".into(), what_went_wrong: \"\".into(), how_to_fix: \"\".into() }.is_allowed());\n        assert!(AuditResult { verdict: \"APPROVED\".into(), failure_category: \"none\".into(), what_worked: \"\".into(), what_went_wrong: \"\".into(), how_to_fix: \"\".into() }.is_allowed());\n        assert!(!AuditResult { verdict: \"BLOCKED\".into(), failure_category: \"ghost_tooling\".into(), what_worked: \"\".into(), what_went_wrong: \"\".into(), how_to_fix: \"\".into() }.is_allowed());\n    }\n\n    #[test]\n    fn test_parse_verdict_clean() {\n        let raw = r#\"{\"verdict\": \"BLOCKED\", \"what_worked\": \"W\", \"what_went_wrong\": \"WW\", \"how_to_fix\": \"H\"}\"#;\n        let res = AuditResult::parse_verdict(raw);\n        assert_eq!(res.verdict, \"BLOCKED\");\n        assert_eq!(res.what_worked, \"W\");\n        assert_eq!(res.what_went_wrong, \"WW\");\n        assert_eq!(res.how_to_fix, \"H\");\n    }\n\n    #[test]\n    fn test_parse_verdict_markdown() {\n        let raw = \"```json\\n{\\\"verdict\\\": \\\"BLOCKED\\\", \\\"what_worked\\\": \\\"W\\\", \\\"what_went_wrong\\\": \\\"WW\\\", \\\"how_to_fix\\\": \\\"H\\\"}\\n```\";\n        let res = AuditResult::parse_verdict(raw);\n        assert_eq!(res.verdict, \"BLOCKED\");\n    }\n\n    #[test]\n    fn test_parse_verdict_markdown_no_lang() {\n        let raw = \"```\\n{\\\"verdict\\\": \\\"BLOCKED\\\", \\\"what_worked\\\": \\\"W\\\", \\\"what_went_wrong\\\": \\\"WW\\\", \\\"how_to_fix\\\": \\\"H\\\"}\\n```\";\n        let res = AuditResult::parse_verdict(raw);\n        assert_eq!(res.verdict, \"BLOCKED\");\n    }\n\n    #[test]\n    fn test_parse_verdict_fail_open() {\n        let raw = \"I am an AI, I cannot output JSON.\";\n        let res = AuditResult::parse_verdict(raw);\n        assert_eq!(res.verdict, \"BLOCKED\");\n        assert!(res.what_went_wrong.contains(\"Observer Audit generated invalid JSON structure\"));\n    }\n\n    #[tokio::test]\n    async fn test_run_skeptic_audit_success() {\n        let mut mock_provider = MockProvider::new();\n        let valid_json = r#\"```json\n        {\n            \"verdict\": \"ALLOWED\",\n            \"what_worked\": \"N/A\",\n            \"what_went_wrong\": \"Safe\",\n            \"how_to_fix\": \"None\"\n        }\n        ```\"#;\n        mock_provider.expect_generate().returning(move |_, _, _, _ctx, _| Ok(valid_json.to_string()));\n\n        let event = Event {\n            platform: \"test\".into(),\n            scope: Scope::Public { channel_id: \"test\".into(), user_id: \"test\".into() },\n            author_name: \"User\".into(),\n            author_id: \"testuid\".into(),\n            content: \"Hello\".into(),\n        };\n\n        // Pass a dummy history event to cover the history iteration loop\n        let history_event = Event {\n            platform: \"test\".into(),\n            scope: Scope::Public { channel_id: \"test\".into(), user_id: \"test\".into() },\n            author_name: \"OldUser\".into(),\n            author_id: \"old\".into(),\n            content: \"OldMsg\".into(),\n        };\n\n        let caps = AgentCapabilities::default();\n        let res = run_skeptic_audit(Arc::new(mock_provider), \u0026caps, \"My candidate\", \"System\", \u0026[history_event], \u0026event, \"\").await;\n        assert_eq!(res.verdict, \"ALLOWED\");\n    }\n\n    #[tokio::test]\n    async fn test_run_skeptic_audit_provider_error() {\n        let mut mock_provider = MockProvider::new();\n        mock_provider.expect_generate().returning(|_, _, _, _ctx, _| {\n            Err(crate::providers::ProviderError::ConnectionError(\"fail\".into()))\n        });\n\n        let event = Event {\n            platform: \"test\".into(),\n            scope: Scope::Public { channel_id: \"test\".into(), user_id: \"test\".into() },\n            author_name: \"User\".into(),\n            author_id: \"testuid\".into(),\n            content: \"Hello\".into(),\n        };\n\n        let caps = AgentCapabilities::default();\n        let res = run_skeptic_audit(Arc::new(mock_provider), \u0026caps, \"My candidate\", \"System\", \u0026[], \u0026event, \"\").await;\n        assert_eq!(res.verdict, \"BLOCKED\");\n        assert!(res.what_went_wrong.contains(\"fail\"));\n    }\n}\n","traces":[{"line":67,"address":[],"length":0,"stats":{"Line":0}},{"line":68,"address":[],"length":0,"stats":{"Line":0}},{"line":72,"address":[],"length":0,"stats":{"Line":0}},{"line":73,"address":[],"length":0,"stats":{"Line":0}},{"line":76,"address":[],"length":0,"stats":{"Line":0}},{"line":77,"address":[],"length":0,"stats":{"Line":0}},{"line":80,"address":[],"length":0,"stats":{"Line":0}},{"line":81,"address":[],"length":0,"stats":{"Line":0}},{"line":82,"address":[],"length":0,"stats":{"Line":0}},{"line":83,"address":[],"length":0,"stats":{"Line":0}},{"line":89,"address":[],"length":0,"stats":{"Line":0}},{"line":90,"address":[],"length":0,"stats":{"Line":0}},{"line":94,"address":[],"length":0,"stats":{"Line":0}},{"line":95,"address":[],"length":0,"stats":{"Line":0}},{"line":96,"address":[],"length":0,"stats":{"Line":0}},{"line":97,"address":[],"length":0,"stats":{"Line":0}},{"line":98,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":17},{"path":["/","Users","mettamazza","Desktop","HIVE","src","providers","mod.rs"],"content":"use async_trait::async_trait;\nuse mockall::automock;\n\nuse crate::models::message::Event;\n\npub mod ollama;\n\n#[derive(thiserror::Error, Debug)]\npub enum ProviderError {\n    #[error(\"Failed to connect to provider: {0}\")]\n    ConnectionError(String),\n    #[error(\"Failed to parse provider response: {0}\")]\n    ParseError(String),\n}\n\n/// The core trait for any LLM Provider powering the HIVE system persona (Apis).\n/// Generating responses requires:\n/// - The strict system prompt defining Apis\n/// - The securely scoped contextual history of events\n/// - The specific triggering event\n#[automock]\n#[async_trait]\npub trait Provider: Send + Sync {\n    /// Generate a response block.\n    /// `swarm_context` contains the stringified tool execution results accumulated in inner loops.\n    async fn generate(\n        \u0026self,\n        system_prompt: \u0026str,\n        history: \u0026[Event],\n        new_event: \u0026Event,\n        swarm_context: \u0026str,\n        telemetry_tx: Option\u003ctokio::sync::mpsc::Sender\u003cString\u003e\u003e,\n    ) -\u003e Result\u003cString, ProviderError\u003e;\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","mettamazza","Desktop","HIVE","src","providers","ollama.rs"],"content":"#![allow(clippy::collapsible_if)]\nuse reqwest::Client;\nuse serde::{Deserialize, Serialize};\nuse async_trait::async_trait;\nuse tokio::sync::mpsc;\n\nuse crate::models::message::Event;\nuse super::{Provider, ProviderError};\n\n#[derive(Serialize, Deserialize, Clone)]\nstruct OllamaMessage {\n    role: String,\n    content: String,\n}\n\n#[derive(Serialize)]\nstruct OllamaRequest {\n    model: String,\n    messages: Vec\u003cOllamaMessage\u003e,\n    stream: bool,\n}\n\n/// A provider implementation for a local Ollama instance.\npub struct OllamaProvider {\n    client: Client,\n    endpoint: String,\n    model: String,\n}\n\nimpl OllamaProvider {\n    /// Connects to a local Ollama instance defaulting to `qwen3.5:35b` as requested.\n    pub fn new() -\u003e Self {\n        Self {\n            client: Client::new(),\n            endpoint: \"http://localhost:11434/api/chat\".to_string(),\n            model: \"qwen3.5:35b\".to_string(),\n        }\n    }\n    #[cfg(not(tarpaulin_include))]\n    fn map_chunk_err(e: reqwest::Error) -\u003e ProviderError {\n        ProviderError::ConnectionError(e.to_string())\n    }\n}\n\n#[cfg(not(tarpaulin_include))]\n#[async_trait]\nimpl Provider for OllamaProvider {\n    async fn generate(\n        \u0026self,\n        system_prompt: \u0026str,\n        history: \u0026[Event],\n        new_event: \u0026Event,\n        swarm_context: \u0026str,\n        telemetry_tx: Option\u003cmpsc::Sender\u003cString\u003e\u003e,\n    ) -\u003e Result\u003cString, ProviderError\u003e {\n        let mut messages = vec![\n            OllamaMessage {\n                role: \"system\".to_string(),\n                content: system_prompt.to_string(),\n            }\n        ];\n\n        // Format the securely-scoped history\n        for event in history {\n            let role = if event.author_name == \"Apis\" {\n                \"assistant\"\n            } else {\n                \"user\"\n            };\n\n            // Inject the author name softly into user messages so Apis knows who is talking\n            let content = if role == \"user\" {\n                format!(\"{}: {}\", event.author_name, event.content)\n            } else {\n                event.content.clone()\n            };\n\n            messages.push(OllamaMessage {\n                role: role.to_string(),\n                content,\n            });\n        }\n\n        let mut final_user_message = format!(\"{}: {}\", new_event.author_name, new_event.content);\n        if !swarm_context.is_empty() {\n            final_user_message.push_str(\"\\n\\n[INTERNAL EXECUTION LOOP]\\n\");\n            final_user_message.push_str(swarm_context);\n        }\n\n        // Add the current triggering event\n        messages.push(OllamaMessage {\n            role: \"user\".to_string(),\n            content: final_user_message,\n        });\n\n        let payload = OllamaRequest {\n            model: self.model.clone(),\n            messages,\n            stream: true,\n        };\n\n        let mut res = self.client.post(\u0026self.endpoint)\n            .json(\u0026payload)\n            .send()\n            .await\n            .map_err(|e| ProviderError::ConnectionError(e.to_string()))?;\n\n        if !res.status().is_success() {\n            let status = res.status();\n            let text = res.text().await.unwrap_or_default();\n            return Err(ProviderError::ParseError(format!(\"Ollama error {}: {}\", status, text)));\n        }\n\n        let mut full_response = String::new();\n        let mut raw_buffer = String::new();\n\n        while let Some(chunk) = res.chunk().await.map_err(Self::map_chunk_err)? {\n            let chunk_str = String::from_utf8_lossy(\u0026chunk);\n            raw_buffer.push_str(\u0026chunk_str);\n\n            while let Some(newline_pos) = raw_buffer.find('\\n') {\n                let line: String = raw_buffer.drain(..=newline_pos).collect();\n                let line_trimmed = line.trim();\n                if line_trimmed.is_empty() {\n                    continue;\n                }\n\n                // If JSON line parses, extract tokens\n                if let Ok(parsed) = serde_json::from_str::\u003cserde_json::Value\u003e(line_trimmed) {\n                    if let Some(msg) = parsed.get(\"message\") {\n                        if let Some(content) = msg.get(\"content\").and_then(|v| v.as_str()) {\n                            full_response.push_str(content);\n                        }\n\n                        // Some models stream reasoning separately in a 'thinking' key\n                        if let Some(thinking) = msg.get(\"thinking\").and_then(|v| v.as_str()) {\n                            if let Some(ref tx) = telemetry_tx {\n                                if !thinking.is_empty() {\n                                    let _ = tx.send(thinking.to_string()).await;\n                                }\n                            }\n                        }\n                    }\n\n                    if parsed.get(\"done\").and_then(|v| v.as_bool()).unwrap_or(false) {\n                        break;\n                    }\n                } else {\n                    return Err(ProviderError::ParseError(\"Failed to parse JSON stream chunk\".into()));\n                }\n            }\n        }\n\n        Ok(full_response.trim().to_string())\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::models::scope::Scope;\n    use wiremock::matchers::{method, path};\n    use wiremock::{Mock, MockServer, ResponseTemplate};\n\n    #[tokio::test]\n    async fn test_provider_success() {\n        let mock_server = MockServer::start().await;\n        \n        let mut provider = OllamaProvider::new();\n        provider.endpoint = format!(\"{}/api/chat\", mock_server.uri());\n\n        let mock_response = \"{\\\"message\\\": {\\\"role\\\": \\\"assistant\\\", \\\"content\\\": \\\"Sure, here's your context.\\\"}, \\\"done\\\": true}\\n\";\n\n        Mock::given(method(\"POST\"))\n            .and(path(\"/api/chat\"))\n            .respond_with(ResponseTemplate::new(200).set_body_string(mock_response))\n            .mount(\u0026mock_server)\n            .await;\n\n        let history = vec![\n            Event { platform: \"cli\".into(), scope: Scope::Public { channel_id: \"t\".into(), user_id: \"t\".into() }, author_name: \"Apis\".into(), author_id: \"test\".into(), content: \"I am here.\".into() },\n            Event { platform: \"cli\".into(), scope: Scope::Public { channel_id: \"t\".into(), user_id: \"t\".into() }, author_name: \"Alice\".into(), author_id: \"test\".into(), content: \"Hi!\".into() },\n        ];\n        \n        // Single JSON response is technically a 1-line stream chunk\n        let new_event = Event {\n            platform: \"cli\".into(),\n            scope: Scope::Public { channel_id: \"t\".into(), user_id: \"t\".into() },\n            author_name: \"Bob\".into(),\n            author_id: \"test\".into(),\n            content: \"What's up?\".into(),\n        };\n        let res = provider.generate(\"sys\", \u0026history, \u0026new_event, \"\", None).await.unwrap();\n\n        assert_eq!(res, \"Sure, here's your context.\");\n    }\n\n    #[tokio::test]\n    async fn test_provider_http_error() {\n        let mock_server = MockServer::start().await;\n        \n        let mut provider = OllamaProvider::new();\n        provider.endpoint = format!(\"{}/api/chat\", mock_server.uri());\n\n        Mock::given(method(\"POST\"))\n            .and(path(\"/api/chat\"))\n            .respond_with(ResponseTemplate::new(500).set_body_string(\"Internal Server Error\"))\n            .mount(\u0026mock_server)\n            .await;\n\n        let res = provider.generate(\"sys\", \u0026[], \u0026Event {\n            platform: \"cli\".into(),\n            scope: Scope::Public { channel_id: \"t\".into(), user_id: \"t\".into() },\n            author_name: \"Bob\".into(),\n            author_id: \"test\".into(),\n            content: \"Bork?\".into(),\n        }, \"\", None).await;\n\n        assert!(matches!(res, Err(ProviderError::ParseError(_))));\n    }\n\n    #[tokio::test]\n    async fn test_provider_connection_error() {\n        let mut provider = OllamaProvider::new();\n        provider.endpoint = \"http://invalid.domain.that.does.not.exist:1234/api/chat\".into();\n\n        let res = provider.generate(\"sys\", \u0026[], \u0026Event {\n            platform: \"cli\".into(),\n            scope: Scope::Public { channel_id: \"t\".into(), user_id: \"t\".into() },\n            author_name: \"Bob\".into(),\n            author_id: \"test\".into(),\n            content: \"Bork?\".into(),\n        }, \"\", None).await;\n\n        assert!(matches!(res, Err(ProviderError::ConnectionError(_))));\n    }\n\n    #[tokio::test]\n    async fn test_provider_parse_error() {\n        let mock_server = MockServer::start().await;\n        let mut provider = OllamaProvider::new();\n        provider.endpoint = format!(\"{}/api/chat\", mock_server.uri());\n\n        Mock::given(method(\"POST\"))\n            .and(path(\"/api/chat\"))\n            .respond_with(ResponseTemplate::new(200).set_body_string(\"invalid json body!\\n\"))\n            .mount(\u0026mock_server)\n            .await;\n\n        let res = provider.generate(\"sys\", \u0026[], \u0026Event {\n            platform: \"cli\".into(),\n            scope: Scope::Public { channel_id: \"t\".into(), user_id: \"t\".into() },\n            author_name: \"Bob\".into(),\n            author_id: \"test\".into(),\n            content: \"Bork?\".into(),\n        }, \"\", None).await;\n\n        assert!(matches!(res, Err(ProviderError::ParseError(_))));\n    }\n\n    #[tokio::test]\n    async fn test_provider_early_eof() {\n        let mock_server = MockServer::start().await;\n        let mut provider = OllamaProvider::new();\n        provider.endpoint = format!(\"{}/api/chat\", mock_server.uri());\n\n        Mock::given(method(\"POST\"))\n            .and(path(\"/api/chat\"))\n            .respond_with(ResponseTemplate::new(200).set_body_string(\"\"))\n            .mount(\u0026mock_server)\n            .await;\n\n        // No chunks, natural EOF. \n        let res = provider.generate(\"sys\", \u0026[], \u0026Event {\n            platform: \"cli\".into(),\n            scope: Scope::Public { channel_id: \"t\".into(), user_id: \"t\".into() },\n            author_name: \"Bob\".into(),\n            author_id: \"test\".into(),\n            content: \"Bork?\".into(),\n        }, \"\", None).await;\n\n        assert_eq!(res.unwrap(), \"\");\n    }\n\n    #[tokio::test]\n    async fn test_provider_reasoning_telemetry() {\n        let mock_server = MockServer::start().await;\n        let mut provider = OllamaProvider::new();\n        provider.endpoint = format!(\"{}/api/chat\", mock_server.uri());\n\n        let mock_response = \"{\\\"message\\\": {\\\"role\\\": \\\"assistant\\\", \\\"thinking\\\": \\\"I am thinking...\\\", \\\"content\\\": \\\"Final answer\\\"}, \\\"done\\\": true}\\n\";\n\n        Mock::given(method(\"POST\"))\n            .and(path(\"/api/chat\"))\n            .respond_with(ResponseTemplate::new(200).set_body_string(mock_response))\n            .mount(\u0026mock_server)\n            .await;\n\n        let (tx, mut rx) = mpsc::channel(10);\n        \n        let res = provider.generate(\"sys\", \u0026[], \u0026Event {\n            platform: \"cli\".into(),\n            scope: Scope::Public { channel_id: \"t\".into(), user_id: \"t\".into() },\n            author_name: \"Bob\".into(),\n            author_id: \"test\".into(),\n            content: \"Bork?\".into(),\n        }, \"\", Some(tx)).await;\n\n        let first_recv = rx.recv().await.unwrap();\n        let second_recv = rx.recv().await.unwrap();\n        assert!(first_recv == \"Final answer\" || first_recv == \"I am thinking...\");\n        assert!(second_recv == \"Final answer\" || second_recv == \"I am thinking...\");\n        assert_eq!(res.unwrap(), \"Final answer\");\n    }\n\n    #[tokio::test]\n    async fn test_provider_missing_content() {\n        let mock_server = MockServer::start().await;\n        let mut provider = OllamaProvider::new();\n        provider.endpoint = format!(\"{}/api/chat\", mock_server.uri());\n\n        let mock_response = \"{\\\"message\\\": {\\\"role\\\": \\\"assistant\\\"}, \\\"done\\\": true}\\n\";\n\n        Mock::given(method(\"POST\"))\n            .and(path(\"/api/chat\"))\n            .respond_with(ResponseTemplate::new(200).set_body_string(mock_response))\n            .mount(\u0026mock_server)\n            .await;\n\n        let res = provider.generate(\"sys\", \u0026[], \u0026Event {\n            platform: \"cli\".into(),\n            scope: Scope::Public { channel_id: \"t\".into(), user_id: \"t\".into() },\n            author_name: \"Bob\".into(),\n            author_id: \"test\".into(),\n            content: \"Bork?\".into(),\n        }, \"\", None).await;\n\n        assert_eq!(res.unwrap(), \"\");\n    }\n}\n","traces":[{"line":32,"address":[],"length":0,"stats":{"Line":0}},{"line":34,"address":[],"length":0,"stats":{"Line":0}},{"line":35,"address":[],"length":0,"stats":{"Line":0}},{"line":36,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":4},{"path":["/","Users","mettamazza","Desktop","HIVE","src","swarm","drone.rs"],"content":"use std::sync::Arc;\nuse crate::models::drone::{DroneTemplate, DroneResult, DroneStatus};\nuse crate::providers::Provider;\nuse crate::models::message::Event;\nuse crate::models::scope::Scope;\n\npub struct DroneExecutor {\n    pub provider: Arc\u003cdyn Provider\u003e,\n    pub template: DroneTemplate,\n}\n\n#[cfg(not(tarpaulin_include))]\nimpl DroneExecutor {\n    pub fn new(provider: Arc\u003cdyn Provider\u003e, template: DroneTemplate) -\u003e Self {\n        Self { provider, template }\n    }\n\n    pub async fn execute(\u0026self, task_id: \u0026str, task_description: \u0026str, context: \u0026str, telemetry_tx: Option\u003ctokio::sync::mpsc::Sender\u003cString\u003e\u003e) -\u003e DroneResult {\n        let system_prompt = format!(\n            \"{}\\n\\n[CONTEXT PROVIDED BY QUEEN]\\n{}\\n\\n[YOUR TASK]\\n{}\",\n            self.template.system_prompt,\n            context,\n            task_description\n        );\n\n        let dummy_event = Event {\n            platform: \"swarm\".into(),\n            scope: Scope::Private { user_id: \"drone\".into() },\n            author_name: \"Queen\".into(),\n            author_id: \"test\".into(),\n            content: \"Execute task.\".into(),\n        };\n\n        // We use the shared provider for execution, but could swap model if template.model_override is set.\n        let result = self.provider.generate(\u0026system_prompt, \u0026[], \u0026dummy_event, \"\", telemetry_tx).await;\n\n        match result {\n            Ok(output) =\u003e {\n                // In the future we will count tokens, for now mock it to 0\n                DroneResult {\n                    task_id: task_id.to_string(),\n                    output,\n                    tokens_used: 0, \n                    status: DroneStatus::Success,\n                }\n            }\n            Err(e) =\u003e {\n                DroneResult {\n                    task_id: task_id.to_string(),\n                    output: String::new(),\n                    tokens_used: 0,\n                    status: DroneStatus::Failed(format!(\"Drone iteration failed: {:?}\", e)),\n                }\n            }\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::providers::{MockProvider, ProviderError};\n\n    #[tokio::test]\n    async fn test_drone_execute_success() {\n        let mut mock_provider = MockProvider::new();\n        mock_provider\n            .expect_generate()\n            .returning(|sys, _, _, _ctx, _| {\n                assert!(sys.contains(\"You are a test drone\"));\n                assert!(sys.contains(\"Context\"));\n                assert!(sys.contains(\"Task\"));\n                Ok(\"Success output\".to_string())\n            });\n\n        let template = DroneTemplate {\n            name: \"test\".into(),\n            system_prompt: \"You are a test drone\".into(),\n            tools: vec![],\n        };\n\n        let executor = DroneExecutor::new(Arc::new(mock_provider), template);\n        let result = executor.execute(\"task_1\", \"Task\", \"Context\", None).await;\n\n        assert_eq!(result.task_id, \"task_1\");\n        assert_eq!(result.output, \"Success output\");\n        assert_eq!(result.status, DroneStatus::Success);\n    }\n\n    #[tokio::test]\n    async fn test_drone_execute_failure() {\n        let mut mock_provider = MockProvider::new();\n        mock_provider\n            .expect_generate()\n            .returning(|_, _, _, _, _| Err(ProviderError::ConnectionError(\"Boom\".into())));\n\n        let template = DroneTemplate {\n            name: \"test\".into(),\n            system_prompt: \"sys\".into(),\n            tools: vec![],\n        };\n\n        let executor = DroneExecutor::new(Arc::new(mock_provider), template);\n        let result = executor.execute(\"task_2\", \"Task desc\", \"Ctx\", None).await;\n\n        assert_eq!(result.task_id, \"task_2\");\n        assert!(matches!(result.status, DroneStatus::Failed(_)));\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","mettamazza","Desktop","HIVE","src","swarm","mod.rs"],"content":"#![allow(clippy::useless_format, clippy::needless_borrow, clippy::needless_borrows_for_generic_args)]\nuse std::collections::HashMap;\nuse std::sync::Arc;\nuse crate::models::drone::{DroneTemplate, DroneResult, DroneStatus};\nuse crate::providers::Provider;\nuse crate::memory::MemoryStore;\nuse crate::models::scope::Scope;\n\npub mod planner;\npub mod drone;\n\npub struct SwarmManager {\n    registry: HashMap\u003cString, DroneTemplate\u003e,\n    provider: Arc\u003cdyn Provider\u003e,\n    memory: Arc\u003cMemoryStore\u003e,\n}\n\nimpl SwarmManager {\n    pub fn new(provider: Arc\u003cdyn Provider\u003e, memory: Arc\u003cMemoryStore\u003e) -\u003e Self {\n        let mut registry = HashMap::new();\n        \n        // Register default built-in drones\n        let researcher = DroneTemplate {\n            name: \"researcher\".into(),\n            system_prompt: \"You are the Researcher Drone. Your job is to analyze information, find facts, and summarize data objectively. You HAVE LIVE INTERNET ACCESS and will search the web to verify current facts.\".into(),\n            tools: vec![],\n        };\n\n        let channel_reader = DroneTemplate {\n            name: \"native_channel_reader\".into(),\n            system_prompt: \"You natively pull the recent message history of the current channel based on the task description Target ID. You do not use LLM inference, you return the timeline JSONL block. The planner should provide the Target Entity ID in the description.\".into(),\n            tools: vec![],\n        };\n\n        let codebase_list = DroneTemplate {\n            name: \"native_codebase_list\".into(),\n            system_prompt: \"You list all files and directories recursively from the project root. You do not use LLM inference, you simply return the directory tree. The planner should output a blank description.\".into(),\n            tools: vec![],\n        };\n\n        let codebase_read = DroneTemplate {\n            name: \"native_codebase_read\".into(),\n            system_prompt: \"You are the Codebase Reader Drone. You natively read the contents of a specific file in the HIVE codebase. The planner must put EXACTLY the relative file path (e.g. src/engine/mod.rs) in the description.\".into(),\n            tools: vec![],\n        };\n\n        let web_search = DroneTemplate {\n            name: \"native_web_search\".into(),\n            system_prompt: \"You are the Web Search Drone. You search the LIVE EXTERNAL INTERNET for facts, news, and external documentation via DuckDuckGo. The planner should provide the query in the description.\".into(),\n            tools: vec![],\n        };\n\n        registry.insert(researcher.name.clone(), researcher);\n        registry.insert(channel_reader.name.clone(), channel_reader);\n        registry.insert(codebase_list.name.clone(), codebase_list);\n        registry.insert(codebase_read.name.clone(), codebase_read);\n        registry.insert(web_search.name.clone(), web_search);\n\n        Self {\n            registry,\n            provider,\n            memory,\n        }\n    }\n\n    pub fn register_drone(\u0026mut self, template: DroneTemplate) {\n        self.registry.insert(template.name.clone(), template);\n    }\n\n    /// Exposes all registered drone names so they can be securely injected into \n    /// the AgentCapabilities matrix at engine boot.\n    pub fn get_drone_names(\u0026self) -\u003e Vec\u003cString\u003e {\n        self.registry.keys().cloned().collect()\n    }\n\n    pub fn get_template(\u0026self, name: \u0026str) -\u003e Option\u003cDroneTemplate\u003e {\n        self.registry.get(name).cloned()\n    }\n\n    /// Fetches all registered drones formatted as a string for the Queen Planner prompt\n    pub fn get_available_drones_text(\u0026self) -\u003e String {\n        let mut out = String::new();\n        for (name, template) in \u0026self.registry {\n            out.push_str(\u0026format!(\"- DRONE `{}`: {}\\n\", name, template.system_prompt));\n        }\n        out\n    }\n\n    /// Executes a swarm plan by spawning all tasks concurrently.\n    /// In a fully robust graph, we would respect `depends_on`. For now, we fan out in parallel.\n    #[cfg(not(tarpaulin_include))]\n    pub async fn execute_plan(\u0026self, plan: crate::swarm::planner::SwarmPlan, context: \u0026str, telemetry_tx: Option\u003ctokio::sync::mpsc::Sender\u003cString\u003e\u003e) -\u003e Vec\u003cDroneResult\u003e {\n        let mut futures = vec![];\n\n        for task in plan.tasks {\n            // Intercept Native Drones\n            if task.drone_type == \"native_channel_reader\" {\n                let mem_clone = self.memory.clone();\n                let task_id = task.task_id.clone();\n                let desc = task.description.clone(); // E.g., tells which Scope or channel ID\n                \n                // For now, we assume the planner task description contains the target scope string\n                // But generally the planner executes on the current Context Event anyway.\n                // We'll parse the description or just default read the timeline logic.\n                \n                let tx_clone = telemetry_tx.clone();\n                let handle = tokio::spawn(async move {\n                    if let Some(ref tx) = tx_clone {\n                        let _ = tx.send(format!(\"🧠 Native Channel Reader Drone executing...\\n\")).await;\n                    }\n                    // Extract channel_id if possible, or we could just pass `Event` down the SwarmManager tree.\n                    // To keep it simple, we'll try to extract target from desc \n                    let target_id = desc.split_whitespace().last().unwrap_or(\u0026\"\").to_string();\n                    let pub_scope = Scope::Public { channel_id: target_id.clone(), user_id: \"system\".into() };\n\n                    let output = if let Ok(timeline_data) = mem_clone.timeline.read_timeline(\u0026pub_scope).await {\n                        String::from_utf8_lossy(\u0026timeline_data).to_string()\n                    } else {\n                        \"Failed to read timeline for channel.\".to_string()\n                    };\n                    \n                    DroneResult {\n                        task_id,\n                        output,\n                        tokens_used: 0,\n                        status: DroneStatus::Success,\n                    }\n                });\n                futures.push(handle);\n                continue;\n            } else if task.drone_type == \"native_codebase_list\" {\n                let task_id = task.task_id.clone();\n                let tx_clone = telemetry_tx.clone();\n                let handle = tokio::spawn(async move {\n                    if let Some(ref tx) = tx_clone {\n                        let _ = tx.send(format!(\"🧠 Native Codebase List Drone executing...\\n\")).await;\n                    }\n                    // Quick recursive list, we'll shell out to `find` for simplicity or use standard local traversal.\n                    // Returning a hardcoded string or running a quick command is easiest since we know linux/mac.\n                    // For pure rust, we'll try std::process::Command\n                    let output = match std::process::Command::new(\"find\").arg(\"src\").arg(\"-type\").arg(\"f\").output() {\n                        Ok(res) =\u003e String::from_utf8_lossy(\u0026res.stdout).to_string(),\n                        Err(e) =\u003e format!(\"Failed to list codebase: {}\", e),\n                    };\n                    DroneResult {\n                        task_id,\n                        output,\n                        tokens_used: 0,\n                        status: DroneStatus::Success,\n                    }\n                });\n                futures.push(handle);\n                continue;\n            } else if task.drone_type == \"native_codebase_read\" {\n                let task_id = task.task_id.clone();\n                let desc = task.description.clone();\n                let tx_clone = telemetry_tx.clone();\n                let handle = tokio::spawn(async move {\n                    if let Some(ref tx) = tx_clone {\n                        let _ = tx.send(format!(\"🧠 Native Codebase Reader Drone reading: {}\\n\", desc)).await;\n                    }\n                    // Extract the path by looking for something that looks like a file path\n                    // Apis often writes: \"Read the main engine module file (src/engine/mod.rs) to verify...\"\n                    let target_path = desc\n                        .split_whitespace()\n                        .find(|s| s.contains(\"src/\") || s.contains('/') || s.ends_with(\".rs\") || s.ends_with(\".py\") || s.ends_with(\".toml\"))\n                        .map(|s| s.trim_matches(|c| c == '(' || c == ')' || c == '\\'' || c == '\"' || c == '`'))\n                        .unwrap_or_else(|| desc.split_whitespace().last().unwrap_or(\"\"))\n                        .to_string();\n                    \n                    // Basic sanity check to prevent arbitrary file reading outside cwd\n                    let output = if target_path.contains(\"..\") || target_path.starts_with('/') {\n                        \"Access Denied: Path traverses outside isolated project root.\".to_string()\n                    } else if let Ok(content) = tokio::fs::read_to_string(\u0026target_path).await {\n                        format!(\"--- FILE: {} ---\\n{}\", target_path, content)\n                    } else {\n                        // Fuzzy fallback: extract filename and search src/ for it\n                        let filename = std::path::Path::new(\u0026target_path)\n                            .file_name()\n                            .and_then(|f| f.to_str())\n                            .unwrap_or(\u0026target_path);\n                        \n                        let find_result = std::process::Command::new(\"find\")\n                            .args(\u0026[\"src\", \"-name\", filename, \"-type\", \"f\"])\n                            .output();\n                        \n                        match find_result {\n                            Ok(res) =\u003e {\n                                let found = String::from_utf8_lossy(\u0026res.stdout);\n                                let found_path = found.trim().lines().next().unwrap_or(\"\");\n                                if !found_path.is_empty() {\n                                    if let Ok(content) = tokio::fs::read_to_string(found_path).await {\n                                        format!(\"--- FILE: {} (resolved from '{}') ---\\n{}\", found_path, target_path, content)\n                                    } else {\n                                        format!(\"Failed to read file: {} (found at {} but read failed)\", target_path, found_path)\n                                    }\n                                } else {\n                                    format!(\"Failed to read file: {} (not found, also searched src/ for '{}')\", target_path, filename)\n                                }\n                            }\n                            Err(_) =\u003e format!(\"Failed to read file: {}\", target_path),\n                        }\n                    };\n\n                    DroneResult {\n                        task_id,\n                        output,\n                        tokens_used: 0,\n                        status: DroneStatus::Success,\n                    }\n                });\n                futures.push(handle);\n                continue;\n            } else if task.drone_type == \"native_web_search\" || task.drone_type == \"researcher\" {\n                let task_id = task.task_id.clone();\n                let desc = task.description.clone();\n                let tx_clone = telemetry_tx.clone();\n\n                let handle = tokio::spawn(async move {\n                    if let Some(ref tx) = tx_clone {\n                        let _ = tx.send(format!(\"🌐 Native Web Search Drone searching for: {}\\n\", desc)).await;\n                    }\n                    \n                    // Simple internet fetch using curl to DuckDuckGo HTML Lite\n                    let query = desc.replace(\" \", \"+\");\n                    let output = match std::process::Command::new(\"curl\")\n                        .args(\u0026[\"-s\", \"-A\", \"Mozilla/5.0\", \u0026format!(\"https://html.duckduckgo.com/html/?q={}\", query)])\n                        .output() \n                    {\n                        Ok(res) =\u003e {\n                            let html = String::from_utf8_lossy(\u0026res.stdout);\n                            if html.is_empty() {\n                                \"Failed to retrieve search results (empty response).\".to_string()\n                            } else {\n                                // Extremely naive HTML stripping to extract snippets\n                                let mut text = String::new();\n                                let mut in_tag = false;\n                                for c in html.chars() {\n                                    if c == '\u003c' { in_tag = true; }\n                                    else if c == '\u003e' { in_tag = false; text.push(' '); }\n                                    else if !in_tag { text.push(c); }\n                                }\n                                \n                                // Clean up excessive whitespace\n                                let cleaned: Vec\u003c\u0026str\u003e = text.split_whitespace().collect();\n                                let final_text = cleaned.join(\" \");\n                                \n                                format!(\"--- SEARCH RESULTS for '{}' ---\\n{}\", desc, final_text)\n                            }\n                        }\n                        Err(e) =\u003e format!(\"Failed to execute search: {}\", e),\n                    };\n\n                    DroneResult {\n                        task_id,\n                        output,\n                        tokens_used: 0,\n                        status: DroneStatus::Success,\n                    }\n                });\n                futures.push(handle);\n                continue;\n            }\n\n            if let Some(template) = self.get_template(\u0026task.drone_type) {\n                let context_clone = context.to_string();\n                let provider_clone = self.provider.clone();\n                let task_id = task.task_id.clone();\n                let desc = task.description.clone();\n\n                let tx_clone = telemetry_tx.clone();\n                let template_name = template.name.clone();\n\n                let handle = tokio::spawn(async move {\n                    if let Some(ref tx) = tx_clone {\n                        let _ = tx.send(format!(\"🚀 Spawning Drone `{}` for Task: {}\\n\", template_name, task_id)).await;\n                    }\n                    let executor = drone::DroneExecutor::new(provider_clone, template);\n                    executor.execute(\u0026task_id, \u0026desc, \u0026context_clone, tx_clone).await\n                });\n\n                futures.push(handle);\n            } else {\n                // Return immediate failure if drone doesn't exist\n                futures.push(tokio::spawn(async move {\n                    DroneResult {\n                        task_id: task.task_id.clone(),\n                        output: String::new(),\n                        tokens_used: 0,\n                        status: DroneStatus::Failed(format!(\"Drone type '{}' not found\", task.drone_type)),\n                    }\n                }));\n            }\n        }\n\n        let mut results = vec![];\n        for f in futures {\n            if let Ok(res) = f.await {\n                results.push(res);\n            }\n        }\n        results\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::providers::MockProvider;\n    use crate::models::drone::DroneStatus;\n\n    #[tokio::test]\n    async fn test_swarm_manager_registration() {\n        let provider = Arc::new(MockProvider::new());\n        let memory = Arc::new(MemoryStore::default());\n        let mut swarm = SwarmManager::new(provider, memory);\n        \n        let template = DroneTemplate {\n            name: \"test_drone\".into(),\n            system_prompt: \"sys\".into(),\n            tools: vec![],\n        };\n        \n        swarm.register_drone(template.clone());\n        assert!(swarm.get_template(\"test_drone\").is_some());\n    }\n\n    #[tokio::test]\n    async fn test_swarm_execute_plan_success() {\n        let mut mock_provider = MockProvider::new();\n        mock_provider\n            .expect_generate()\n            .returning(|_, _, _, _, _| Ok(\"Drone output\".to_string()));\n\n        let memory = Arc::new(MemoryStore::default());\n        let swarm = SwarmManager::new(Arc::new(mock_provider), memory);\n        \n        let plan = crate::swarm::planner::SwarmPlan {\n            thought: Some(\"I should do research\".to_string()),\n            tasks: vec![\n                crate::swarm::planner::SwarmTask {\n                    task_id: \"1\".into(),\n                    drone_type: \"researcher\".into(),\n                    description: \"do research\".into(),\n                    depends_on: vec![],\n                }\n            ],\n        };\n\n        let results = swarm.execute_plan(plan, \"User said hello\", None).await;\n        \n        assert_eq!(results.len(), 1);\n        assert_eq!(results[0].task_id, \"1\");\n        assert_eq!(results[0].output, \"Drone output\");\n        assert_eq!(results[0].status, DroneStatus::Success);\n    }\n\n    #[tokio::test]\n    async fn test_swarm_execute_plan_drone_not_found() {\n        let mock_provider = MockProvider::new();\n        let memory = Arc::new(MemoryStore::default());\n        let swarm = SwarmManager::new(Arc::new(mock_provider), memory);\n        \n        let plan = crate::swarm::planner::SwarmPlan {\n            thought: None,\n            tasks: vec![\n                crate::swarm::planner::SwarmTask {\n                    task_id: \"2\".into(),\n                    drone_type: \"missing_drone\".into(),\n                    description: \"fail\".into(),\n                    depends_on: vec![],\n                }\n            ],\n        };\n\n        let results = swarm.execute_plan(plan, \"Context\", None).await;\n        \n        assert_eq!(results.len(), 1);\n        assert_eq!(results[0].task_id, \"2\");\n        assert!(matches!(results[0].status, DroneStatus::Failed(_)));\n    }\n}\n","traces":[{"line":19,"address":[],"length":0,"stats":{"Line":1}},{"line":20,"address":[],"length":0,"stats":{"Line":2}},{"line":24,"address":[],"length":0,"stats":{"Line":3}},{"line":25,"address":[],"length":0,"stats":{"Line":2}},{"line":26,"address":[],"length":0,"stats":{"Line":1}},{"line":30,"address":[],"length":0,"stats":{"Line":3}},{"line":31,"address":[],"length":0,"stats":{"Line":2}},{"line":32,"address":[],"length":0,"stats":{"Line":1}},{"line":36,"address":[],"length":0,"stats":{"Line":3}},{"line":37,"address":[],"length":0,"stats":{"Line":2}},{"line":38,"address":[],"length":0,"stats":{"Line":1}},{"line":42,"address":[],"length":0,"stats":{"Line":3}},{"line":43,"address":[],"length":0,"stats":{"Line":2}},{"line":44,"address":[],"length":0,"stats":{"Line":1}},{"line":48,"address":[],"length":0,"stats":{"Line":3}},{"line":49,"address":[],"length":0,"stats":{"Line":2}},{"line":50,"address":[],"length":0,"stats":{"Line":1}},{"line":53,"address":[],"length":0,"stats":{"Line":5}},{"line":54,"address":[],"length":0,"stats":{"Line":5}},{"line":5 ols first.\n2. SEPARATE PLANNING FROM EXECUTION: The loop runs up to 15 turns. You must mentally separate Planning from Execution. Identify your current phase (e.g. Discovery, Execution) and do not mix them.\n3. TIGHT FEEDBACK LOOPS: If a step depends on the output of a previous step, DO NOT try to chain them in a single response array. Execute the first step, end your response, wait for the Observation data on the next turn, and then proceed.\n4. PARALLEL EXECUTION: You may chain multiple tools in the `\"tasks\"` array ONLY if they are completely independent parallel actions (e.g. searching 3 different files at once).\n5. CRITICAL LOOP CONSTRAINT: You are trapped in a JSON execution loop. You CANNOT talk to the user directly in raw text. To reply, you MUST construct a JSON block and use the `reply_to_request` tool.\n\n[SYSTEM ISOLATION PROTOCOL]\nYou may occasionally see messages like `[CRITICAL SYSTEM ERROR]`, `[SYSTEM COMPILER ERROR]`, or `[INTERNAL AUDIT: INVISIBLE TO USER]` injected into your timeline. \nThese are **INTERNAL SYSTEM TELEMETRY** messages generated by your own background daemons or the internal safety Observer. \n1. The user CANNOT see these messages. \n2. The user did NOT write these messages.\n3. **NEVER** apologize to the user for these errors. \n4. **NEVER** acknowledge that an error occurred in your final reply to the user.\n5. When you see an internal error or Observer block, silently correct the formatting or capability violation in your next JSON payload, and construct your `reply_to_request` as a natural, seamless continuation of the *original* conversation with the user.\n\n[TOOL SCHEMA EXAMPLES]\n\n// Example 1: Information Gathering\n```json\n{\n  \"thought\": \"Internal monologue / strategy / reasoning\",\n  \"tasks\": [\n    {\n      \"task_id\": \"step_1\",\n      \"drone_type\": \"native_web_search\",\n      \"description\": \"latest Rust release notes\",\n      \"depends_on\": [] \n    },\n    {\n      \"task_id\": \"step_2\",\n      \"drone_type\": \"researcher\",\n      \"description\": \"Analyze this topic...\",\n      \"depends_on\": [] \n    }\n  ]\n}\n```\n\n// Example 2: Codebase Context \u0026 Reply\n```json\n{\n  \"thought\": \"Internal monologue / strategy / reasoning\",\n  \"tasks\": [\n    {\n      \"task_id\": \"step_1\",\n      \"drone_type\": \"native_codebase_list\",\n      \"description\": \"\",\n      \"depends_on\": []\n    },\n    {\n      \"task_id\": \"step_2\",\n      \"drone_type\": \"native_codebase_read\",\n      \"description\": \"src/main.rs\",\n      \"depends_on\": [\"step_1\"]\n    },\n    {\n      \"task_id\": \"step_3\",\n      \"drone_type\": \"native_channel_reader\",\n      \"description\": \"channel_id_here\",\n      \"depends_on\": []\n    },\n    {\n      \"task_id\": \"step_4\",\n      \"drone_type\": \"reply_to_request\",\n      \"description\": \"Your final conversational answer to the user goes here.\",\n      \"depends_on\": [\"step_2\", \"step_3\"]\n    }\n  ]\n}\n```\n\"#;\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","mettamazza","Desktop","HIVE","src","teacher","mod.rs"],"content":"#![allow(clippy::too_many_arguments, clippy::field_reassign_with_default)]\nuse std::path::PathBuf;\nuse std::sync::atomic::{AtomicUsize, Ordering};\nuse std::sync::Arc;\nuse tokio::sync::Mutex;\nuse serde::{Deserialize, Serialize};\n\nuse crate::models::message::Event;\nuse crate::models::scope::Scope;\n\n/// A single golden example: first-pass Observer approval, perfect interaction.\n#[derive(Debug, Serialize, Deserialize)]\npub struct GoldenExample {\n    pub ts: String,\n    pub system_prompt: String,\n    pub user_msg: String,\n    pub swarm_ctx: String,\n    pub response: String,\n    pub tools: Vec\u003cString\u003e,\n    pub attempts: usize,\n}\n\n/// A single ORPO preference pair: blocked response vs corrected response.\n#[derive(Debug, Serialize, Deserialize)]\npub struct PreferencePair {\n    pub ts: String,\n    pub prompt: String,\n    pub chosen: String,\n    pub rejected: String,\n    pub failure_category: String,\n    pub observer_reason: String,\n    pub rejection_index: usize,\n    pub total_attempts: usize,\n}\n\n/// Model version metadata for manifest.json lineage tracking.\n#[derive(Debug, Serialize, Deserialize)]\npub struct ModelVersion {\n    pub version: String,\n    pub date: String,\n    pub golden_count: usize,\n    pub pair_count: usize,\n    pub parent: String,\n}\n\n/// Manifest tracking model lineage and retention.\n#[derive(Debug, Serialize, Deserialize)]\npub struct Manifest {\n    pub current: String,\n    pub base: String,\n    pub history: Vec\u003cModelVersion\u003e,\n    pub retention: usize,\n}\n\nimpl Default for Manifest {\n    fn default() -\u003e Self {\n        Self {\n            current: \"qwen3.5:35b\".to_string(),\n            base: \"qwen3.5:35b\".to_string(),\n            history: vec![],\n            retention: 5,\n        }\n    }\n}\n\n/// Configuration constants for the training supervisor.\npub const GOLDEN_THRESHOLD: usize = 5;\npub const PAIR_THRESHOLD: usize = 3;\npub const MIN_COOLDOWN_SECS: u64 = 15 * 60; // 15 minutes\n\n/// The Teacher captures golden examples and preference pairs for self-supervised learning.\n/// It uses atomic counters on the hot path and a separate training lock for the background task.\n#[derive(Clone)]\npub struct Teacher {\n    pub golden_path: PathBuf,\n    pub preference_path: PathBuf,\n    archive_dir: PathBuf,\n    manifest_path: PathBuf,\n    training_lock: Arc\u003cMutex\u003cbool\u003e\u003e,\n    pub golden_count: Arc\u003cAtomicUsize\u003e,\n    pub preference_count: Arc\u003cAtomicUsize\u003e,\n    pub auto_train_enabled: Arc\u003cstd::sync::atomic::AtomicBool\u003e,\n}\n\nimpl Teacher {\n    pub fn new(base_dir: Option\u003cPathBuf\u003e) -\u003e Self {\n        #[cfg(test)]\n        let default_dir = std::env::temp_dir().join(format!(\"hive_mem_test_teacher_{}\", std::time::SystemTime::now().duration_since(std::time::UNIX_EPOCH).unwrap().as_nanos()));\n        #[cfg(not(test))]\n        let default_dir = PathBuf::from(\"./memory/teacher\");\n\n        let base = base_dir.unwrap_or(default_dir);\n        std::fs::create_dir_all(\u0026base).ok();\n        let archive = base.join(\"archive\");\n        std::fs::create_dir_all(\u0026archive).ok();\n\n        let golden_path = base.join(\"golden_buffer.jsonl\");\n        let preference_path = base.join(\"preference_buffer.jsonl\");\n\n        // Initialize counters from existing files so we don't start at 0 on restart\n        let initial_golden = std::fs::read_to_string(\u0026golden_path)\n            .unwrap_or_default()\n            .lines()\n            .filter(|l| !l.trim().is_empty())\n            .count();\n            \n        let initial_preference = std::fs::read_to_string(\u0026preference_path)\n            .unwrap_or_default()\n            .lines()\n            .filter(|l| !l.trim().is_empty())\n            .count();\n\n        Self {\n            golden_path,\n            preference_path,\n            archive_dir: archive,\n            manifest_path: base.join(\"manifest.json\"),\n            training_lock: Arc::new(Mutex::new(false)),\n            golden_count: Arc::new(AtomicUsize::new(initial_golden)),\n            preference_count: Arc::new(AtomicUsize::new(initial_preference)),\n            auto_train_enabled: Arc::new(std::sync::atomic::AtomicBool::new(false)),\n        }\n    }\n\n    /// Capture a golden example (first-pass Observer approval). Public scope only.\n    pub async fn capture_golden(\n        \u0026self,\n        system_prompt: \u0026str,\n        event: \u0026Event,\n        swarm_ctx: \u0026str,\n        response: \u0026str,\n    ) {\n        // Privacy guard: never train on DM content\n        if matches!(event.scope, Scope::Private { .. }) {\n            return;\n        }\n\n        let example = GoldenExample {\n            ts: chrono::Utc::now().to_rfc3339(),\n            system_prompt: system_prompt.to_string(),\n            user_msg: event.content.clone(),\n            swarm_ctx: swarm_ctx.to_string(),\n            response: response.to_string(),\n            tools: Self::extract_tools(swarm_ctx),\n            attempts: 1,\n        };\n\n        if let Ok(json) = serde_json::to_string(\u0026example) {\n            use tokio::io::AsyncWriteExt;\n            if let Ok(mut file) = tokio::fs::OpenOptions::new()\n                .create(true)\n                .append(true)\n                .open(\u0026self.golden_path)\n                .await\n            {\n                let _ = file.write_all(format!(\"{}\\n\", json).as_bytes()).await;\n                self.golden_count.fetch_add(1, Ordering::Relaxed);\n                println!(\"[TEACHER] 🏆 Golden example captured ({} buffered)\", self.golden_count.load(Ordering::Relaxed));\n            }\n        }\n    }\n\n    /// Capture an ORPO preference pair (blocked → corrected). Public scope only.\n    pub async fn capture_preference_pair(\n        \u0026self,\n        system_prompt: \u0026str,\n        event: \u0026Event,\n        swarm_ctx: \u0026str,\n        rejected: \u0026str,\n        chosen: \u0026str,\n        failure_category: \u0026str,\n        observer_reason: \u0026str,\n        rejection_index: usize,\n        total_attempts: usize,\n    ) {\n        if matches!(event.scope, Scope::Private { .. }) {\n            return;\n        }\n\n        let mut user_msg = event.content.clone();\n        if !swarm_ctx.is_empty() {\n            user_msg.push_str(\"\\n\\n[INTERNAL EXECUTION LOOP]\\n\");\n            user_msg.push_str(swarm_ctx);\n        }\n\n        let pair = PreferencePair {\n            ts: chrono::Utc::now().to_rfc3339(),\n            prompt: format!(\"{}\\n\\nUser: {}\", system_prompt, user_msg),\n            chosen: chosen.to_string(),\n            rejected: rejected.to_string(),\n            failure_category: failure_category.to_string(),\n            observer_reason: observer_reason.to_string(),\n            rejection_index,\n            total_attempts,\n        };\n\n        if let Ok(json) = serde_json::to_string(\u0026pair) {\n            use tokio::io::AsyncWriteExt;\n            if let Ok(mut file) = tokio::fs::OpenOptions::new()\n                .create(true)\n                .append(true)\n                .open(\u0026self.preference_path)\n                .await\n            {\n                let _ = file.write_all(format!(\"{}\\n\", json).as_bytes()).await;\n                self.preference_count.fetch_add(1, Ordering::Relaxed);\n                println!(\"[TEACHER] ⚖️ Preference pair captured [{}] ({} buffered)\", failure_category, self.preference_count.load(Ordering::Relaxed));\n            }\n        }\n    }\n\n    /// Get current buffer counts (atomic, zero overhead on hot path).\n    pub fn get_counts(\u0026self) -\u003e (usize, usize) {\n        (\n            self.golden_count.load(Ordering::Relaxed),\n            self.preference_count.load(Ordering::Relaxed),\n        )\n    }\n\n    /// Try to acquire the training lock. Returns true if acquired.\n    pub async fn try_acquire_training_lock(\u0026self) -\u003e bool {\n        let mut locked = self.training_lock.lock().await;\n        if *locked {\n            false\n        } else {\n            *locked = true;\n            true\n        }\n    }\n\n    /// Release the training lock.\n    pub async fn release_training_lock(\u0026self) {\n        let mut locked = self.training_lock.lock().await;\n        *locked = false;\n    }\n\n    /// Reset buffer counters after training processes the files.\n    pub fn reset_counts(\u0026self) {\n        self.golden_count.store(0, Ordering::Relaxed);\n        self.preference_count.store(0, Ordering::Relaxed);\n    }\n\n    /// Load or create the manifest file.\n    pub fn load_manifest(\u0026self) -\u003e Manifest {\n        if let Ok(data) = std::fs::read_to_string(\u0026self.manifest_path) {\n            serde_json::from_str(\u0026data).unwrap_or_default()\n        } else {\n            Manifest::default()\n        }\n    }\n\n    /// Save manifest to disk.\n    pub fn save_manifest(\u0026self, manifest: \u0026Manifest) {\n        if let Ok(json) = serde_json::to_string_pretty(manifest) {\n            let _ = std::fs::write(\u0026self.manifest_path, json);\n        }\n    }\n\n    /// Extract tool names from swarm context string.\n    pub fn extract_tools(swarm_ctx: \u0026str) -\u003e Vec\u003cString\u003e {\n        let mut tools = vec![];\n        for line in swarm_ctx.lines() {\n            if line.starts_with(\"Drone:\") || line.contains(\"drone_type\") {\n                tools.push(line.trim().to_string());\n            }\n        }\n        tools\n    }\n\n    /// Get the archive directory path.\n    pub fn get_archive_dir(\u0026self) -\u003e \u0026PathBuf {\n        \u0026self.archive_dir\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::models::scope::Scope;\n    use tempfile::TempDir;\n\n    fn test_event(scope: Scope) -\u003e Event {\n        Event {\n            platform: \"test\".into(),\n            scope,\n            author_name: \"Tester\".into(),\n            author_id: \"123\".into(),\n            content: \"Hello Apis\".into(),\n        }\n    }\n\n    #[test]\n    fn test_teacher_new() {\n        let tmp = TempDir::new().unwrap();\n        let teacher = Teacher::new(Some(tmp.path().to_path_buf()));\n        assert_eq!(teacher.get_counts(), (0, 0));\n    }\n\n    #[test]\n    fn test_teacher_default_dir() {\n        let teacher = Teacher::new(None);\n        assert!(teacher.golden_path.ends_with(\"golden_buffer.jsonl\"));\n        assert!(teacher.preference_path.ends_with(\"preference_buffer.jsonl\"));\n    }\n\n    #[tokio::test]\n    async fn test_capture_golden_public() {\n        let tmp = TempDir::new().unwrap();\n        let teacher = Teacher::new(Some(tmp.path().to_path_buf()));\n\n        let event = test_event(Scope::Public {\n            channel tHasher::new();\n        text.hash(\u0026mut hasher);\n        format!(\"{:x}\", hasher.finish())\n    }\n\n    pub async fn get_audio_path(\u0026self, text: \u0026str) -\u003e std::io::Result\u003cPathBuf\u003e {\n        let hash = Self::hash_text(text);\n        let output_path = self.cache_dir.join(format!(\"{}.wav\", hash));\n\n        // If it's already generated and cached, instantly return it\n        if output_path.exists() {\n            info!(\"[Voice] Cache hit for {}\", hash);\n            // Touch the file to update its modified time so the sweeper doesn't delete it\n            let _ = std::fs::File::open(\u0026output_path); // Just opening it updates atime/mtime on some OSes\n            return Ok(output_path);\n        }\n\n        info!(\n            \"[Voice] Cache miss for {}. Generating via Kokoro ONNX...\",\n            hash\n        );\n\n        // Subprocess to the python environment to run Kokoro\n        let python_cmd = std::env::var(\"HIVE_PYTHON_BIN\").unwrap_or_else(|_| \"python3\".to_string());\n\n        let output = Command::new(python_cmd)\n            .arg(\u0026self.worker_path)\n            .arg(text)\n            .arg(\u0026output_path)\n            .output()?;\n\n        if !output.status.success() {\n            let err = String::from_utf8_lossy(\u0026output.stderr);\n            error!(\"[Voice] Generator error: {}\", err);\n            return Err(std::io::Error::other(\"Kokoro generation failed.\"));\n        }\n\n        Ok(output_path)\n    }\n\n    /// Deletes any `.wav` file in the cache directory older than 1 hour (3600 seconds)\n    pub async fn sweep_cache(\u0026self) -\u003e std::io::Result\u003c()\u003e {\n        let mut entries = fs::read_dir(\u0026self.cache_dir).await?;\n        let now = SystemTime::now();\n        let max_age = std::time::Duration::from_secs(3600);\n\n        let mut deleted_count = 0;\n\n        while let Some(entry) = entries.next_entry().await? {\n            if let Ok(metadata) = entry.metadata().await\n                \u0026\u0026 let Ok(modified) = metadata.modified()\n                \u0026\u0026 let Ok(age) = now.duration_since(modified)\n                \u0026\u0026 age \u003e max_age\n            {\n                if let Err(e) = fs::remove_file(entry.path()).await {\n                    warn!(\"[Voice] Failed to clean up old cache file: {}\", e);\n                } else {\n                    deleted_count += 1;\n                }\n            }\n        }\n\n        if deleted_count \u003e 0 {\n            info!(\n                \"[Voice] Swept {} old audio files from cache.\",\n                deleted_count\n            );\n        }\n\n        Ok(())\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::fs::File;\n    use tempfile::TempDir;\n\n    #[test]\n    fn test_hash_text() {\n        let hash1 = KokoroTTS::hash_text(\"Hello world\");\n        let hash2 = KokoroTTS::hash_text(\"Hello world\");\n        let hash3 = KokoroTTS::hash_text(\"Different\");\n        assert_eq!(hash1, hash2);\n        assert_ne!(hash1, hash3);\n    }\n\n    #[tokio::test]\n    async fn test_new_creates_dir() {\n        // Test explicit directory creation by enforcing a clean state\n        let temp_dir = TempDir::new().unwrap();\n        let custom_cache = temp_dir.path().join(\"memory/cache/tts\");\n        assert!(!custom_cache.exists());\n\n        let tts = KokoroTTS {\n            cache_dir: custom_cache.clone(),\n            worker_path: PathBuf::from(\"dummy.py\"),\n        };\n\n        // Emulate the inside of `new()` targeting our temp dir\n        fs::create_dir_all(\u0026tts.cache_dir).await.unwrap();\n        assert!(custom_cache.exists());\n    }\n\n    #[tokio::test]\n    async fn test_sweep_cache() {\n        let temp_dir = TempDir::new().unwrap();\n        let engine = KokoroTTS {\n            cache_dir: temp_dir.path().to_path_buf(),\n            worker_path: PathBuf::from(\"dummy.py\"),\n        };\n\n        // Create a new file\n        let new_file_path = temp_dir.path().join(\"new.wav\");\n        File::create(\u0026new_file_path).unwrap();\n\n        // Create an \"old\" file\n        let old_file_path = temp_dir.path().join(\"old.wav\");\n        let file = File::create(\u0026old_file_path).unwrap();\n        let two_hours_ago = SystemTime::now() - std::time::Duration::from_secs(7200);\n        file.set_modified(two_hours_ago).unwrap();\n        drop(file);\n\n        // Create a directory that looks like an old file (to trigger remove_file failure branch)\n        let old_dir_path = temp_dir.path().join(\"old_dir.wav\");\n        std::fs::create_dir(\u0026old_dir_path).unwrap();\n        let dir_file = File::open(\u0026old_dir_path).unwrap();\n        dir_file.set_modified(two_hours_ago).unwrap();\n        drop(dir_file);\n\n        // Sweep it\n        engine.sweep_cache().await.unwrap();\n\n        // New file remains, old file deleted\n        assert!(new_file_path.exists());\n        assert!(!old_file_path.exists());\n\n        // Directories cannot be deleted by `remove_file`, so it triggers the warn! and remains\n        assert!(old_dir_path.exists());\n    }\n\n    #[tokio::test]\n    async fn test_get_audio_path_cache_hit() {\n        let temp_dir = TempDir::new().unwrap();\n        let engine = KokoroTTS {\n            cache_dir: temp_dir.path().to_path_buf(),\n            worker_path: PathBuf::from(\"dummy.py\"),\n        };\n\n        let text = \"Test cache hit\";\n        let hash = KokoroTTS::hash_text(text);\n        let expected_path = temp_dir.path().join(format!(\"{}.wav\", hash));\n        File::create(\u0026expected_path).unwrap();\n\n        let path = engine.get_audio_path(text).await.unwrap();\n        assert_eq!(path, expected_path);\n    }\n\n    #[tokio::test]\n    async fn test_get_audio_path_generator_fail() {\n        let temp_dir = TempDir::new().unwrap();\n        let engine = KokoroTTS {\n            cache_dir: temp_dir.path().to_path_buf(),\
